<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛意AI - 人脸检测</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet" href="static/css/all.min.css">
    <link id="favicon" rel="icon" href="static/images/favicon.ico" type="image/x-icon">
    <style>
        /* 人脸检测页面样式 */
        .face-page .content-grid {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .face-page .left-column,
        .face-page .right-column {
            display: none;
        }
        .face-page .face-full-column {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .face-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 0;
        }

        .face-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: white;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #eaeaea;
        }

        .face-header h2 {
            color: #4a6572;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
            border-bottom: none;
            padding-bottom: 0;
        }

        .face-header h2 i {
            color: #e67e22;
        }

        .face-header .header-hint {
            font-size: 0.85rem;
            color: #7f8c8d;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .face-body {
            display: flex;
            gap: 10px;
            flex: 1;
            min-height: 0;
        }

        .face-left-panel {
            width: 380px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .face-right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
        }

        .face-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #eaeaea;
        }

        .face-card h3 {
            color: #4a6572;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .face-card h3 i {
            color: #e67e22;
        }

        /* 上传区域 */
        .face-upload-area {
            border: 3px dashed #e67e22;
            border-radius: 15px;
            padding: 15px 15px;
            text-align: center;
            background: linear-gradient(135deg, #fef9f0, #fdf2e9);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .face-upload-area:hover {
            background: linear-gradient(135deg, #fdf2e9, #fce4d6);
            border-color: #d35400;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(230, 126, 34, 0.15);
        }

        .face-upload-area .upload-icon {
            font-size: 2.5rem;
            color: #e67e22;
            margin-bottom: 6px;
        }

        .face-upload-area .upload-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 6px;
        }

        .face-upload-area .upload-hint {
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        /* 预览区域 */
        .face-preview-container {
            position: relative;
            display: none;
        }

        .face-preview-container img {
            max-width: 100%;
            max-height: 120px;
            border-radius: 8px;
            border: 1px solid #eaeaea;
        }

        .face-file-info {
            margin-top: 8px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .face-file-info .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .face-file-info .info-label {
            color: #7f8c8d;
        }

        .face-file-info .info-value {
            color: #2c3e50;
            font-weight: 500;
        }

        /* 检测按钮 */
        .btn-detect {
            width: 100%;
            padding: 10px;
            background: linear-gradient(90deg, #e67e22, #d35400);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-detect:hover:not(:disabled) {
            background: linear-gradient(90deg, #d35400, #c0392b);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230, 126, 34, 0.35);
        }

        .btn-detect:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 结果图片区域 */
        .face-result-image-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .face-result-image-wrapper {
            flex: 1;
            background: #f8f9fa;
            border-radius: 8px;
            border: 2px dashed #dee2e6;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 150px;
            position: relative;
        }

        .face-result-image-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .face-result-placeholder {
            text-align: center;
            color: #adb5bd;
        }

        .face-result-placeholder i {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .face-result-placeholder p {
            font-size: 1rem;
        }

        /* JSON 结果区域 */
        .face-json-container {
            max-height: 200px;
            overflow-y: auto;
        }

        .face-json-container pre {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            overflow-x: auto;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* 检测统计 */
        .face-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .face-stat-card {
            text-align: center;
            padding: 15px 10px;
            border-radius: 8px;
            color: white;
        }

        .face-stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .face-stat-card .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-top: 4px;
        }

        /* 加载动画 */
        .face-loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .face-loading.active {
            display: block;
        }

        .face-loading .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top-color: #e67e22;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .face-loading .loading-text {
            color: #7f8c8d;
            font-size: 0.95rem;
        }

        /* 示例图片选择 */
        .face-sample-images {
            margin: 15px 0;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #eaeaea;
        }

        .face-sample-images .sample-label {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .face-sample-images .sample-grid {
            display: flex;
            gap: 10px;
        }

        .face-sample-images .sample-item {
            flex: 1;
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            text-align: center;
            background: white;
            padding: 6px;
        }

        .face-sample-images .sample-item:hover {
            border-color: #e67e22;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(230, 126, 34, 0.2);
        }

        .face-sample-images .sample-item.selected {
            border-color: #e67e22;
            background: #fef9f0;
        }

        .face-sample-images .sample-item img {
            width: 100%;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
        }

        .face-sample-images .sample-item span {
            display: block;
            font-size: 0.75rem;
            color: #2c3e50;
            margin-top: 4px;
            font-weight: 500;
        }

        /* 全屏查看器（与 index.html 统一） */
        .face-fullscreen-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            animation: faceFadeIn 0.3s ease;
        }
        .face-fullscreen-viewer.active { display: flex; }
        .face-fullscreen-content {
            width: 95%;
            height: 95%;
            background: #1a1a1a;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: faceScaleIn 0.3s ease;
        }
        .face-fullscreen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #2c3e50;
            color: white;
        }
        .face-fullscreen-header h3 { margin: 0; font-size: 1.2rem; }
        .face-fullscreen-close {
            background: none; border: none; color: white;
            font-size: 1.5rem; cursor: pointer; padding: 5px;
        }
        .face-fullscreen-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        #faceFullscreenImage {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            transition: transform 0.3s ease;
            cursor: move;
            image-rendering: auto;
            image-rendering: crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            -ms-interpolation-mode: bicubic;
        }
        .face-fullscreen-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 30px;
        }
        .face-control-btn {
            background: #3498db;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: background 0.3s ease;
        }
        .face-control-btn:hover { background: #2980b9; }
        .face-control-btn.zoom-in { background: #2ecc71; }
        .face-control-btn.zoom-out { background: #e74c3c; }
        .face-control-btn.zoom-reset { background: #f39c12; }
        .face-control-btn.rotate-left { background: #9b59b6; }
        .face-control-btn.rotate-right { background: #34495e; }
        .face-control-btn.download-btn { background: #1abc9c; }
        .face-fullscreen-info {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        @keyframes faceFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes faceScaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* 预览图片和结果图片可点击放大 */
        .face-preview-container img,
        .face-result-image-wrapper img {
            cursor: zoom-in;
            transition: transform 0.2s ease;
        }

        .face-preview-container img:hover,
        .face-result-image-wrapper img:hover {
            transform: scale(1.02);
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .face-body {
                flex-direction: column;
            }
            .face-left-panel {
                width: 100%;
            }
        }
    </style>
    <script src="https://unpkg.com/jquery@3.6.0/dist/jquery.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jquery.json-viewer@1.5.0/json-viewer/jquery.json-viewer.css">
    <script src="https://unpkg.com/jquery.json-viewer@1.5.0/json-viewer/jquery.json-viewer.js"></script>
</head>
<body>
    <div class="container">
        <!-- 公共头部（由 layout.js 动态加载） -->
        <div id="header-placeholder"></div>

        <!-- 主体布局 -->
        <div class="main-layout">
            <!-- 公共侧边栏（由 layout.js 动态加载） -->
            <div id="sidebar-placeholder"></div>

            <!-- 主要内容区域 -->
            <main class="main-content-area face-page">
                <div class="content-grid">
                    <div class="face-full-column">
                        <div class="face-wrapper">
                            <!-- 主体 -->
                            <div class="face-body">
                                <!-- 左侧面板：上传和设置 -->
                                <div class="face-left-panel">
                                    <!-- 上传区域 -->
                                    <div class="face-card">
                                        <h3><i class="fas fa-cloud-upload-alt"></i> 上传图片</h3>
                                        <div class="face-upload-area" id="uploadArea">
                                            <div class="upload-icon">
                                                <i class="fas fa-image"></i>
                                            </div>
                                            <div class="upload-text">点击选择或拖放图片</div>
                                            <div class="upload-hint">支持 JPG、PNG、JPEG 格式</div>
                                            <input type="file" id="fileInput" accept=".jpg,.jpeg,.png" hidden>
                                            <button class="btn btn-primary upload-btn" type="button">
                                                <i class="fas fa-folder-open"></i> 选择文件
                                            </button>
                                        </div>

                                        <!-- 预览 -->
                                        <div class="face-preview-container" id="previewContainer">
                                            <img id="imagePreview" src="" alt="图片预览">
                                            <div class="face-file-info">
                                                <div class="info-row">
                                                    <span class="info-label">文件名:</span>
                                                    <span class="info-value" id="fileName">-</span>
                                                </div>
                                                <div class="info-row">
                                                    <span class="info-label">文件大小:</span>
                                                    <span class="info-value" id="fileSize">-</span>
                                                </div>
                                                <div class="info-row">
                                                    <span class="info-label">图片尺寸:</span>
                                                    <span class="info-value" id="imageDims">-</span>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- 检测按钮 -->
                                        <button class="btn-detect" id="detectBtn" disabled>
                                            <i class="fas fa-search"></i>
                                            开始检测
                                        </button>

                                        <!-- 加载动画 -->
                                        <div class="face-loading" id="loadingIndicator">
                                            <div class="spinner"></div>
                                            <span class="loading-text">正在调用模型进行人脸检测...</span>
                                        </div>

                                        <!-- 默认图片选择 -->
                                        <div class="face-sample-images">
                                            <div class="sample-label"><i class="fas fa-images"></i> 示例图片：</div>
                                            <div class="sample-grid">
                                                <div class="sample-item selected" data-src="static/images/demo/7.png">
                                                    <img src="static/images/demo/7.png" alt="示例7">
                                                    <span>7.png</span>
                                                </div>
                                                <div class="sample-item" data-src="static/images/demo/9.jpg">
                                                    <img src="static/images/demo/9.jpg" alt="示例9">
                                                    <span>9.jpg</span>
                                                </div>
                                                <div class="sample-item" data-src="static/images/demo/10.jpg">
                                                    <img src="static/images/demo/10.jpg" alt="示例10">
                                                    <span>10.jpg</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- 检测统计 -->
                                    <div class="face-card" id="statsCard" style="display: none;">
                                        <h3><i class="fas fa-chart-bar"></i> 检测统计</h3>
                                        <div class="face-stats">
                                            <div class="face-stat-card" style="background: linear-gradient(135deg, #e67e22, #d35400);">
                                                <div class="stat-value" id="faceCount">0</div>
                                                <div class="stat-label">检测到人脸</div>
                                            </div>
                                            <div class="face-stat-card" style="background: linear-gradient(135deg, #3498db, #2980b9);">
                                                <div class="stat-value" id="imgWidth">0</div>
                                                <div class="stat-label">图片宽度</div>
                                            </div>
                                            <div class="face-stat-card" style="background: linear-gradient(135deg, #2ecc71, #27ae60);">
                                                <div class="stat-value" id="imgHeight">0</div>
                                                <div class="stat-label">图片高度</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- 右侧面板：结果展示 -->
                                <div class="face-right-panel">
                                    <div class="face-card ai-result-card">
                                        <div class="ai-result-header">
                                            <h3><i class="fas fa-eye"></i> 检测结果</h3>
                                            <div class="ai-result-actions">
                                                <div class="ai-result-tabs" data-ai-result-tabs>
                                                    <button type="button" class="ai-result-tab active" data-target="image">
                                                        <i class="fas fa-image"></i>
                                                        <span>图片结果</span>
                                                    </button>
                                                    <button type="button" class="ai-result-tab" data-target="json">
                                                        <i class="fas fa-file-code"></i>
                                                        <span>JSON 信息</span>
                                                    </button>
                                                </div>
                                                <button type="button" class="ai-result-copy" data-ai-copy-json title="复制 JSON" aria-label="复制 JSON">
                                                    <i class="fas fa-copy"></i>
                                                    <span>复制</span>
                                                </button>
                                            </div>
                                        </div>
                                        <div class="ai-result-body">
                                            <div class="ai-result-pane active" data-pane="image">
                                                <div class="face-result-image-wrapper" id="resultImageWrapper">
                                                    <div class="face-result-placeholder" id="resultPlaceholder">
                                                        <i class="fas fa-image"></i>
                                                        <p>上传图片并点击"开始检测"查看结果</p>
                                                    </div>
                                                    <img id="resultImage" src="" alt="检测结果" style="display: none;">
                                                </div>
                                            </div>
                                            <div class="ai-result-pane" data-pane="json">
                                                <div class="face-json-container">
                                                    <pre id="jsonOutput">{
    "message": "等待检测..."
}</pre>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- 公共底部（由 layout.js 动态加载） -->
        <div id="footer-placeholder"></div>
    </div>

    <script src="static/js/layout.js"></script>
    <script>
        // 人脸检测页面 JavaScript
        document.addEventListener('DOMContentLoaded', function() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const previewContainer = document.getElementById('previewContainer');
            const imagePreview = document.getElementById('imagePreview');
            const fileName = document.getElementById('fileName');
            const fileSize = document.getElementById('fileSize');
            const imageDims = document.getElementById('imageDims');
            const detectBtn = document.getElementById('detectBtn');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const statsCard = document.getElementById('statsCard');
            const faceCount = document.getElementById('faceCount');
            const imgWidth = document.getElementById('imgWidth');
            const imgHeight = document.getElementById('imgHeight');
            const resultImage = document.getElementById('resultImage');
            const resultPlaceholder = document.getElementById('resultPlaceholder');
            const jsonOutput = document.getElementById('jsonOutput');

            let selectedFile = null;
            let selectedSampleSrc = 'static/images/demo/7.png';

            // 默认选中11.jpg并加载预览
            (function loadDefaultSample() {
                var img = new Image();
                img.onload = function() {
                    imagePreview.src = selectedSampleSrc;
                    previewContainer.style.display = 'block';
                    imageDims.textContent = img.width + ' × ' + img.height;
                };
                img.src = selectedSampleSrc;
                fileName.textContent = '7.png';
                fileSize.textContent = '-';
                detectBtn.disabled = false;
            })();

            // 示例图片选择
            const sampleItems = document.querySelectorAll('.sample-item');
            sampleItems.forEach(function(item) {
                item.addEventListener('click', function() {
                    // 清除其他选中状态
                    sampleItems.forEach(function(si) { si.classList.remove('selected'); });
                    this.classList.add('selected');

                    const src = this.getAttribute('data-src');
                    selectedSampleSrc = src;
                    selectedFile = null; // 清除上传文件

                    // 加载示例图片预览
                    const img = new Image();
                    img.onload = function() {
                        imagePreview.src = src;
                        previewContainer.style.display = 'block';
                        imageDims.textContent = img.width + ' × ' + img.height;
                    };
                    img.src = src;

                    // 显示文件名
                    fileName.textContent = src.split('/').pop();
                    fileSize.textContent = '-';

                    // 启用检测按钮
                    detectBtn.disabled = false;
                });
            });

            // 点击上传区域触发文件选择
            uploadArea.addEventListener('click', function() {
                fileInput.click();
            });

            // 拖放支持
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                uploadArea.style.borderColor = '#d35400';
                uploadArea.style.background = 'linear-gradient(135deg, #fdf2e9, #fce4d6)';
            });

            uploadArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                uploadArea.style.borderColor = '#e67e22';
                uploadArea.style.background = 'linear-gradient(135deg, #fef9f0, #fdf2e9)';
            });

            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                uploadArea.style.borderColor = '#e67e22';
                uploadArea.style.background = 'linear-gradient(135deg, #fef9f0, #fdf2e9)';
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFile(files[0]);
                }
            });

            // 文件选择
            fileInput.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    handleFile(e.target.files[0]);
                }
            });

            // 处理文件
            function handleFile(file) {
                // 验证文件类型
                const validTypes = ['image/jpeg', 'image/png', 'image/jpg'];
                if (!validTypes.includes(file.type)) {
                    alert('请选择 JPG 或 PNG 格式的图片');
                    return;
                }

                selectedFile = file;

                // 显示预览
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    previewContainer.style.display = 'block';
                };
                reader.readAsDataURL(file);

                // 显示文件信息
                fileName.textContent = file.name;
                fileSize.textContent = formatFileSize(file.size);

                // 获取图片尺寸
                const img = new Image();
                img.onload = function() {
                    imageDims.textContent = img.width + ' × ' + img.height;
                };
                img.src = URL.createObjectURL(file);

                // 启用检测按钮
                detectBtn.disabled = false;
            }

            // 格式化文件大小
            function formatFileSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            }

            // 开始检测
            detectBtn.addEventListener('click', function() {
                if (!selectedFile && !selectedSampleSrc) return;

                // 显示扫描动画
                const container = document.querySelector('.ai-result-card');
                if (container) {
                    container.style.position = 'relative';
                    let overlay = container.querySelector('.scanning-overlay');
                    if (!overlay) {
                        overlay = document.createElement('div');
                        overlay.className = 'scanning-overlay';
                        overlay.innerHTML = '<div class="scanning-content"><div class="scanning-animation"><div class="scan-line"></div></div><div class="scanning-text">正在识别中<span class="scanning-dots"></span></div></div>';
                        container.appendChild(overlay);
                    }
                    overlay.classList.add('active');
                }

                // 禁用按钮，显示加载
                detectBtn.disabled = true;
                detectBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 检测中...';
                loadingIndicator.classList.add('active');
                statsCard.style.display = 'none';
                resultImage.style.display = 'none';
                resultPlaceholder.style.display = 'block';
                jsonOutput.textContent = '{\n    "status": "正在检测..."\n}';

                // 构建 FormData
                const formData = new FormData();

                if (selectedFile) {
                    formData.append('file', selectedFile);
                    doDetect(formData);
                } else if (selectedSampleSrc) {
                    // 下载示例图片再上传
                    fetch(selectedSampleSrc)
                        .then(function(resp) { return resp.blob(); })
                        .then(function(blob) {
                            var filename = selectedSampleSrc.split('/').pop();
                            var file = new File([blob], filename, { type: blob.type });
                            formData.append('file', file);
                            doDetect(formData);
                        })
                        .catch(function(err) {
                            jsonOutput.textContent = '{\n    "error": "' + err.message + '"\n}';
                            alert('加载示例图片失败: ' + err.message);
                            detectBtn.disabled = false;
                            detectBtn.innerHTML = '<i class="fas fa-search"></i> 开始检测';
                            loadingIndicator.classList.remove('active');
                        });
                }
            });

            /**
             * 动态获取 API 基础路径
             * 兼容 VSCode 端口转发代理路径
             */
            function getApiBaseUrl() {
                var pathname = window.location.pathname;
                var match = pathname.match(/^(\/proxy\/\d+)/);
                if (match) {
                    return match[1];
                }
                return '';
            }

            function doDetect(formData) {
                // 调用 API
                fetch(getApiBaseUrl() + '/api/face_detection', {
                    method: 'POST',
                    body: formData
                })
                .then(function(response) {
                    return response.json().then(function(data) {
                        return { status: response.status, data: data };
                    });
                })
                .then(function(result) {
                    if (result.data.success) {
                        // 显示结果图片
                        resultImage.src = result.data.result_image;
                        resultImage.style.display = 'block';
                        resultPlaceholder.style.display = 'none';

                        // 显示统计
                        faceCount.textContent = result.data.face_count;
                        imgWidth.textContent = result.data.image_width;
                        imgHeight.textContent = result.data.image_height;
                        statsCard.style.display = 'block';

                        // 显示 JSON
                        displayJSON("jsonOutput", result.data);
                    } else {
                        displayJSON("jsonOutput", result.data);
                        alert('检测失败: ' + (result.data.error || '未知错误'));
                    }
                })
                .catch(function(err) {
                    jsonOutput.textContent = '{\n    "error": "' + err.message + '"\n}';
                    alert('请求失败: ' + err.message);
                })
                .finally(function() {
                    // 隐藏扫描动画
                    const container = document.querySelector('.ai-result-card');
                    if (container) {
                        const overlay = container.querySelector('.scanning-overlay');
                        if (overlay) overlay.classList.remove('active');
                    }

                    detectBtn.disabled = false;
                    detectBtn.innerHTML = '<i class="fas fa-search"></i> 开始检测';
                    loadingIndicator.classList.remove('active');
                });
            }

            // 图片点击放大 - 使用全屏查看器（与 index.html 统一）
            function initImageZoom(imgElement) {
                if (!imgElement) return;
                imgElement.style.cursor = 'zoom-in';
                imgElement.addEventListener('click', function() {
                    if (this.src && this.src !== '') {
                        openFaceFullscreenViewer(this.src);
                    }
                });
            }

            // 初始化预览图片和结果图片的点击放大
            var previewImg = document.getElementById('imagePreview');
            var resultImg = document.getElementById('resultImage');
            initImageZoom(previewImg);
            initImageZoom(resultImg);
        });
    </script>

    <!-- 全屏查看器（与 index.html 统一） -->
    <div class="face-fullscreen-viewer" id="faceFullscreenViewer">
        <div class="face-fullscreen-content">
            <div class="face-fullscreen-header">
                <h3>图片全屏查看</h3>
                <button class="face-fullscreen-close" onclick="closeFaceFullscreenViewer()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="face-fullscreen-body">
                <img id="faceFullscreenImage" src="" alt="全屏图片">
                <div class="face-fullscreen-controls">
                    <button class="face-control-btn zoom-in" onclick="faceZoomIn()" title="放大"><i class="fas fa-search-plus"></i></button>
                    <button class="face-control-btn zoom-out" onclick="faceZoomOut()" title="缩小"><i class="fas fa-search-minus"></i></button>
                    <button class="face-control-btn zoom-reset" onclick="faceZoomReset()" title="重置"><i class="fas fa-sync-alt"></i></button>
                    <button class="face-control-btn rotate-left" onclick="faceRotateLeft()" title="左旋"><i class="fas fa-undo"></i></button>
                    <button class="face-control-btn rotate-right" onclick="faceRotateRight()" title="右旋"><i class="fas fa-redo"></i></button>
                    <button class="face-control-btn download-btn" onclick="faceDownloadImage()" title="下载"><i class="fas fa-download"></i></button>
                </div>
                <div class="face-fullscreen-info">
                    <span id="faceFullscreenInfo">缩放: 100% | 旋转: 0°</span>
                </div>
            </div>
        </div>
    </div>

    <script>
    // 全屏查看器功能（与 index.html 统一）
    (function() {
        var viewer = document.getElementById('faceFullscreenViewer');
        var img = document.getElementById('faceFullscreenImage');
        var info = document.getElementById('faceFullscreenInfo');
        var scale = 1, rotation = 0;

        function updateTransform() {
            img.style.transform = 'scale(' + scale + ') rotate(' + rotation + 'deg)';
            info.textContent = '缩放: ' + Math.round(scale * 100) + '% | 旋转: ' + rotation + '°';
        }

        window.openFaceFullscreenViewer = function(src) {
            img.src = src;
            scale = 1; rotation = 0;
            updateTransform();
            viewer.classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeFaceFullscreenViewer = function() {
            viewer.classList.remove('active');
            document.body.style.overflow = '';
        };

        window.faceZoomIn = function() { scale = Math.min(scale + 0.25, 5); updateTransform(); };
        window.faceZoomOut = function() { scale = Math.max(scale - 0.25, 0.25); updateTransform(); };
        window.faceZoomReset = function() { scale = 1; rotation = 0; updateTransform(); };
        window.faceRotateLeft = function() { rotation = (rotation - 90) % 360; updateTransform(); };
        window.faceRotateRight = function() { rotation = (rotation + 90) % 360; updateTransform(); };
        window.faceDownloadImage = function() {
            var link = document.createElement('a');
            link.download = 'face_image_' + Date.now() + '.png';
            link.href = img.src;
            link.click();
        };

        viewer.addEventListener('click', function(e) {
            if (e.target === viewer) closeFaceFullscreenViewer();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && viewer.classList.contains('active')) closeFaceFullscreenViewer();
        });
    })();
    </script>
    <script src="static/js/json-viewer-helper.js"></script>
</body>
</html>
