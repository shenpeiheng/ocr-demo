<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper 语音转字幕 - 赛意AI</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet" href="static/css/all.min.css">
    <link id="favicon" rel="icon" href="static/images/favicon.ico" type="image/x-icon">
    <style>
        .whisper-page {
            overflow: hidden;
        }

        .whisper-page .content-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 10px;
            height: 100%;
            overflow: hidden;
        }

        /* 左侧控制面板 */
        .control-panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #eaeaea;
        }

        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
            background: white;
        }

        .panel-header h2 {
            margin: 0;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #303133;
            font-weight: 700;
        }

        .panel-header h2 i {
            color: #ad063e;
        }

        .panel-header p {
            margin: 4px 0 0;
            font-size: 12px;
            color: #7f8c8d;
        }

        .panel-body {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 系统状态 */
        .status-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #e8eaef;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
        }

        .status-badge i {
            font-size: 16px;
        }

        .status-badge.ready {
            color: #2e7d32;
        }

        .status-badge.not-ready {
            color: #c62828;
        }

        .status-detail {
            margin-top: 8px;
            font-size: 11px;
            color: #909399;
            padding-left: 24px;
        }

        /* 上传区域 */
        .upload-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            border: 1px solid #e8eaef;
        }

        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #303133;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            color: #ad063e;
        }

        .upload-area {
            border: 2px dashed #dcdfe6;
            border-radius: 6px;
            padding: 30px 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .upload-area:hover {
            border-color: #ad063e;
            background: #fef5f7;
        }

        .upload-area.dragging {
            border-color: #ad063e;
            background: #fef5f7;
        }

        .upload-icon {
            font-size: 36px;
            color: #ad063e;
            margin-bottom: 10px;
        }

        .upload-text {
            font-size: 13px;
            color: #606266;
            margin-bottom: 4px;
        }

        .upload-hint {
            font-size: 11px;
            color: #909399;
        }

        .upload-progress {
            width: 100%;
            height: 6px;
            background: #e8eaef;
            border-radius: 3px;
            margin: 10px 0;
            overflow: hidden;
        }

        .upload-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ad063e, #e91e63);
            border-radius: 3px;
            transition: width 0.3s;
        }

        /* 配置区域 */
        .config-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            border: 1px solid #e8eaef;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #606266;
            margin-bottom: 6px;
        }

        .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 13px;
            color: #303133;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .form-group select:focus {
            outline: none;
            border-color: #ad063e;
            box-shadow: 0 0 0 3px rgba(173, 6, 62, 0.1);
        }

        /* 按钮 */
        .btn-primary {
            width: 100%;
            padding: 14px 20px;
            background: #ad063e;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            background: #920535;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(173, 6, 62, 0.3);
        }

        .btn-primary:disabled {
            background: #ccc;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 右侧任务列表 */
        .results-panel {
            background: white;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #eaeaea;
        }

        .results-header {
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
            background: white;
        }

        .results-header h2 {
            margin: 0;
            font-size: 18px;
            color: #303133;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .results-header h2 i {
            color: #ad063e;
        }

        .results-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        /* 任务卡片 */
        .task-card {
            border: 1px solid #e8eaef;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            background: #fafafa;
            transition: all 0.3s;
        }

        .task-card:hover {
            border-color: #ad063e;
            box-shadow: 0 2px 12px rgba(173, 6, 62, 0.1);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .task-filename {
            font-size: 14px;
            font-weight: 600;
            color: #303133;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .task-status {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            margin-left: 10px;
        }

        .task-status.uploaded {
            background: #e3f2fd;
            color: #1565c0;
        }

        .task-status.processing {
            background: #fff3cd;
            color: #856404;
        }

        .task-status.completed {
            background: #d4edda;
            color: #155724;
        }

        .task-status.failed {
            background: #f8d7da;
            color: #721c24;
        }

        .task-progress {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .task-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ad063e, #c4612f);
            transition: width 0.3s;
            border-radius: 3px;
        }

        .task-message {
            font-size: 12px;
            color: #606266;
            margin-bottom: 10px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            line-height: 1.6;
        }

        .task-progress-detail {
            font-size: 11px;
            color: #909399;
            margin-top: 4px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .btn-download {
            padding: 6px 12px;
            background: white;
            border: 1px solid #ad063e;
            color: #ad063e;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-download:hover {
            background: #ad063e;
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #909399;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 12px;
            color: #dcdfe6;
        }

        .empty-state-text {
            font-size: 14px;
        }

        /* 视频预览弹窗 */
        .video-preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }

        .video-preview-modal.active {
            display: flex;
        }

        .video-preview-container,
        .ai-summary-container {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .ai-summary-container {
            max-width: 1400px;
            width: 95%;
        }

        .video-preview-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .video-preview-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 700;
            color: #303133;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .video-preview-header h3 i {
            color: #ad063e;
        }

        .btn-close-preview {
            background: none;
            border: none;
            font-size: 20px;
            color: #909399;
            cursor: pointer;
            padding: 4px 8px;
            transition: all 0.2s;
        }

        .btn-close-preview:hover {
            color: #ad063e;
            transform: rotate(90deg);
        }

        .video-preview-body {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        .video-player {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        .video-player video {
            width: 100%;
            height: auto;
            display: block;
        }

        /* AI 纪要样式 */
        .ai-summary-toolbar {
            padding: 12px 20px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafafa;
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toolbar-left label {
            font-size: 13px;
            font-weight: 600;
            color: #606266;
        }

        .toolbar-left select {
            padding: 6px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 13px;
            color: #303133;
            background: white;
            cursor: pointer;
        }

        .toolbar-right {
            display: flex;
            gap: 10px;
        }

        .btn-generate,
        .btn-export {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-generate {
            background: #ad063e;
            color: white;
        }

        .btn-generate:hover {
            background: #920535;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(173, 6, 62, 0.3);
        }

        .btn-generate:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-export {
            background: #67C23A;
            color: white;
        }

        .btn-export:hover {
            background: #5daf34;
        }

        .btn-export:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .ai-summary-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: #e5e7eb;
            flex: 1;
            overflow: hidden;
        }

        .summary-panel {
            background: white;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-title {
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 700;
            color: #303133;
            background: #f8f9fa;
            border-bottom: 1px solid #e5e7eb;
        }

        .transcript-content,
        .summary-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
            font-size: 14px;
            line-height: 1.8;
            color: #606266;
        }

        .loading-placeholder,
        .empty-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #909399;
        }

        .empty-placeholder i {
            font-size: 48px;
            margin-bottom: 12px;
            color: #dcdfe6;
        }

        .empty-placeholder p {
            font-size: 13px;
            margin: 0;
        }

        .summary-content h3 {
            font-size: 15px;
            font-weight: 700;
            color: #303133;
            margin: 20px 0 10px;
        }

        .summary-content h3:first-child {
            margin-top: 0;
        }

        .summary-content ul {
            margin: 8px 0;
            padding-left: 20px;
        }

        .summary-content li {
            margin: 6px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="header-placeholder"></div>
        <div class="main-layout">
            <div id="sidebar-placeholder"></div>
            <main class="main-content-area whisper-page">
                <div class="content-grid">
                    <!-- 左侧控制面板 -->
                    <div class="control-panel">
                        <div class="panel-header">
                            <h2><i class="fas fa-microphone"></i> Whisper 转字幕</h2>
                            <p>上传音视频文件，AI 自动生成字幕</p>
                        </div>
                        <div class="panel-body">
                            <!-- 系统状态 -->
                            <div class="status-section">
                                <div class="section-title">
                                    <i class="fas fa-info-circle"></i> 系统状态
                                </div>
                                <div id="systemStatus">
                                    <div class="status-badge not-ready">
                                        <i class="fas fa-spinner fa-spin"></i>
                                        <span>检查中...</span>
                                    </div>
                                </div>
                            </div>

                            <!-- 上传区域 -->
                            <div class="upload-section">
                                <div class="section-title">
                                    <i class="fas fa-cloud-upload-alt"></i> 选择文件
                                </div>
                                <div class="upload-area" id="uploadArea">
                                    <input type="file" id="fileInput" accept="video/*,audio/*" style="display: none;">
                                    <div class="upload-icon">
                                        <i class="fas fa-file-video"></i>
                                    </div>
                                    <div class="upload-text">点击或拖拽上传</div>
                                    <div class="upload-hint">支持 MP4、MP3、WAV 等格式</div>
                                </div>
                            </div>

                            <!-- 配置区域 -->
                            <div class="config-section">
                                <div class="section-title">
                                    <i class="fas fa-cog"></i> 识别配置
                                </div>
                                <div class="form-group">
                                    <label>语言</label>
                                    <select id="languageSelect">
                                        <option value="auto">自动检测</option>
                                        <option value="zh">中文</option>
                                        <option value="yue">粤语</option>
                                        <option value="en">英语</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>模型</label>
                                    <select id="modelSelect">
                                        <option value="tiny">Tiny (最快)</option>
                                        <option value="base" selected>Base (推荐)</option>
                                        <option value="small">Small (更准确)</option>
                                        <option value="medium">Medium (高质量)</option>
                                        <option value="large-v3">Large-v3 (最佳)</option>
                                    </select>
                                </div>
                            </div>

                            <!-- 处理按钮 -->
                            <button class="btn-primary" id="btnProcess" disabled>
                                <i class="fas fa-play"></i>
                                开始处理
                            </button>
                        </div>
                    </div>

                    <!-- 右侧任务列表 -->
                    <div class="results-panel">
                        <div class="results-header">
                            <h2><i class="fas fa-tasks"></i> 处理任务</h2>
                        </div>
                        <div class="results-body" id="taskList">
                            <div class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <div class="empty-state-text">暂无任务</div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
        <div id="footer-placeholder"></div>
    </div>

    <!-- 视频预览弹窗 -->
    <div class="video-preview-modal" id="videoPreviewModal">
        <div class="video-preview-container">
            <div class="video-preview-header">
                <h3><i class="fas fa-play-circle"></i> 视频预览</h3>
                <button class="btn-close-preview" onclick="closeVideoPreview()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="video-preview-body">
                <div class="video-player">
                    <video id="videoPlayer" controls crossorigin="anonymous">
                        <track id="subtitleTrack" kind="subtitles" srclang="zh" label="中文">
                        您的浏览器不支持视频播放
                    </video>
                </div>
            </div>
        </div>
    </div>

    <!-- AI 纪要弹窗 -->
    <div class="video-preview-modal" id="aiSummaryModal">
        <div class="ai-summary-container">
            <div class="video-preview-header">
                <h3><i class="fas fa-robot"></i> AI 会议纪要</h3>
                <button class="btn-close-preview" onclick="closeAiSummary()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="ai-summary-toolbar">
                <div class="toolbar-left">
                    <label>AI 模型：</label>
                    <select id="aiModelSelect" data-model-options="true"></select>
                </div>
                <div class="toolbar-right">
                    <button class="btn-generate" id="btnGenerateSummary" onclick="generateAiSummary()">
                        <i class="fas fa-magic"></i> 生成纪要
                    </button>
                    <button class="btn-export" id="btnExportSummary" onclick="exportSummary()" disabled>
                        <i class="fas fa-download"></i> 导出
                    </button>
                </div>
            </div>
            <div class="ai-summary-body">
                <div class="summary-panel">
                    <div class="panel-title">原始转录</div>
                    <div class="transcript-content" id="transcriptContent">
                        <div class="loading-placeholder">加载中...</div>
                    </div>
                </div>
                <div class="summary-panel">
                    <div class="panel-title">AI 纪要</div>
                    <div class="summary-content" id="summaryContent">
                        <div class="empty-placeholder">
                            <i class="fas fa-robot"></i>
                            <p>点击"生成纪要"按钮开始分析</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="static/js/layout.js"></script>
    <script src="static/js/model-options.js"></script>
    <script src="static/js/whisper.js"></script>
</body>
</html>
