version: '3.8'

services:
  ocr-app:
    image: ocr-industrial-demo
    container_name: ocr-industrial-demo
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DEBUG=false
      - PORT=5000
      - OCR_USE_MOCK=false
      - ENABLE_CORS=true
      - OMP_NUM_THREADS=4
      - NUMEXPR_NUM_THREADS=4
      - OPENBLAS_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - UPLOAD_FOLDER=/app/frontend/uploads
      # PaddleOCR 模型目录
      - PADDLEOCR_MODEL_DIR=/root/.paddleocr
      # ModelScope 模型缓存目录
      - MODELSCOPE_CACHE=/root/.cache/modelscope
      # PyTorch 模型缓存目录
      - TORCH_HOME=/root/.cache/torch
    env_file:
      - .env
    volumes:
      # 挂载上传目录以持久化数据
      - ./frontend/uploads:/app/frontend/uploads
      # 挂载环境变量文件（可选）
      - ./.env:/app/.env
      # 持久化 PaddleOCR 模型文件
      - paddleocr_models:/root/.paddleocr
      # 持久化 ModelScope 模型文件
      - modelscope_models:/root/.cache/modelscope
      # 持久化 PyTorch 模型文件
      - torch_models:/root/.cache/torch
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - ocr-network

# 定义持久化卷
volumes:
  paddleocr_models:
    driver: local
  modelscope_models:
    driver: local
  torch_models:
    driver: local

networks:
  ocr-network:
    driver: bridge

# 使用说明：
# 1. 先构建镜像: docker build -t ocr-industrial-demo .
# 2. 创建 .env 文件: echo MODELSCOPE_API_KEY=your_key_here > .env
# 3. 启动服务: docker-compose up -d
# 4. 查看日志: docker-compose logs -f
# 5. 停止服务: docker-compose down
# 6. 访问应用: http://localhost:5000
