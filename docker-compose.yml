version: '3.8'

services:
  ocr-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-industrial-demo
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DEBUG=false
      - PORT=5000
      - OCR_USE_MOCK=false
      - ENABLE_CORS=true
      - OMP_NUM_THREADS=4
      - NUMEXPR_NUM_THREADS=4
      - OPENBLAS_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - UPLOAD_FOLDER=/app/frontend/uploads
    volumes:
      # 挂载上传目录以持久化数据
      - ./frontend/uploads:/app/frontend/uploads
      # 挂载环境变量文件（可选）
      - ./.env:/app/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - ocr-network
networks:
  ocr-network:
    driver: bridge

# 使用说明：
# 1. 启动服务: docker-compose up -d
# 2. 查看日志: docker-compose logs -f
# 3. 停止服务: docker-compose down
# 4. 重新构建: docker-compose up -d --build
# 5. 访问应用: http://localhost:5000