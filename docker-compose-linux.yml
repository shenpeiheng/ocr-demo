version: '3.8'

services:
  ocr-demo:
    image: ocr-industrial-demo
    container_name: ocr-demo
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DEBUG=false
      - PORT=5000
      - OCR_USE_MOCK=false
      - ENABLE_CORS=true
      - OMP_NUM_THREADS=4
      - NUMEXPR_NUM_THREADS=4
      - OPENBLAS_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - UPLOAD_FOLDER=/app/frontend/uploads
      # PaddleOCR 模型目录
      - PADDLEOCR_MODEL_DIR=/root/.paddleocr
      # ModelScope 模型缓存目录
      - MODELSCOPE_CACHE=/root/.cache/modelscope
      # PyTorch 模型缓存目录
      - TORCH_HOME=/root/.cache/torch
    env_file:
      - .env
    volumes:
      - ./uploads:/app/frontend/uploads
      # 持久化 PaddleOCR 模型文件
      - paddleocr_models:/root/.paddleocr
      # 持久化 ModelScope 模型文件
      - modelscope_models:/root/.cache/modelscope
      # 持久化 PyTorch 模型文件
      - torch_models:/root/.cache/torch
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

# 定义持久化卷
volumes:
  paddleocr_models:
    driver: local
  modelscope_models:
    driver: local
  torch_models:
    driver: local
