<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛意AI</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet" href="static/css/all.min.css">
    <link id="favicon" rel="icon" href="static/images/favicon.ico" type="image/x-icon">
    <script src="https://unpkg.com/jquery@3.6.0/dist/jquery.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jquery.json-viewer@1.5.0/json-viewer/jquery.json-viewer.css">
    <script src="https://unpkg.com/jquery.json-viewer@1.5.0/json-viewer/jquery.json-viewer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .left-column .section-header {
            display: block;
        }
        .left-column .section-header p {
            margin: 4px 0 0;
            font-size: 12px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 公共头部（由 layout.js 动态加载） -->
        <div id="header-placeholder"></div>

        <!-- 主体布局 -->
        <div class="main-layout">
            <!-- 公共侧边栏（由 layout.js 动态加载） -->
            <div id="sidebar-placeholder"></div>

            <!-- 主要内容区域 -->
            <main class="main-content-area">
                <div class="content-grid">
                    <!-- 左侧列：上传和检测入口 -->
                    <div class="left-column">
                        <!-- 上传区域 -->
                        <div class="upload-section card">
                            <div class="section-header">
                                <h2><i class="fas fa-cloud-upload-alt"></i> 图片上传</h2>
                                <p>上传图片 · AI 智能识别分析</p>
                            </div>
                            
                            <div class="upload-area" id="uploadArea">
                                <div class="upload-area-content">
                                    <i class="fas fa-cloud-upload-alt upload-icon"></i>
                                    <p class="upload-text">拖放图片文件或点击选择</p>
                                    <p class="upload-hint">支持 PNG, JPG, JPEG, BMP, TIFF, GIF 格式</p>
                                </div>
                                <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.bmp,.tiff,.gif" hidden>
                                <button class="btn btn-primary upload-btn" id="selectFileBtn">
                                    <i class="fas fa-folder-open"></i> 选择文件
                                </button>
                            </div>
                            
                            <div class="file-info" id="fileInfo" style="display: none;">
                                <div class="file-info-content">
                                    <div class="file-preview">
                                        <img id="imagePreview" src="" alt="图片预览">
                                    </div>
                                    <div class="file-details">
                                        <div class="detail-item">
                                            <span class="detail-label">文件名:</span>
                                            <span class="detail-value" id="fileName">-</span>
                                        </div>
                                        <div class="detail-item">
                                            <span class="detail-label">文件大小:</span>
                                            <span class="detail-value" id="fileSize">-</span>
                                        </div>
                                        <div class="detail-item">
                                            <span class="detail-label">图片尺寸:</span>
                                            <span class="detail-value" id="imageDimensions">-</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="upload-actions">
                                <button class="btn btn-detect action-btn" id="imageOcrProcessBtn" disabled>
                                    <i class="fas fa-search"></i> 开始检测
                                </button>
                            </div>

                            <div class="ocr-loading" id="ocrLoadingIndicator">
                                <div class="spinner"></div>
                                <span class="loading-text">正在调用模型进行多场景OCR检测...</span>
                            </div>

                            <!-- 示例图片选择 -->
                            <div class="sample-images-section" id="sampleImagesSection">
                                <div class="sample-label"><i class="fas fa-images"></i> 示例图片：</div>
                                <div class="sample-grid" id="sampleGrid">
                                    <!-- 由 JS 动态生成 -->
                                </div>
                            </div>

                            <!-- 动态检测统计 -->
                            <div class="ocr-stats-card" id="ocrStatsCard" style="display: none;">
                                <h3><i class="fas fa-chart-bar"></i> 检测统计</h3>
                                <div class="results-summary" id="dynamicStatsContainer">
                                    <!-- 动态生成的统计卡片将插入这里 -->
                                </div>
                            </div>
                        </div>

                        <!-- OCR引擎选择区域 -->
                        <div class="engine-section card" id="engineSection" style="display: none;">
                            <div class="section-header">
                                <h2><i class="fas fa-microchip"></i> OCR引擎选择</h2>
                            </div>
                            
                            <div class="engine-options">
                                <div class="engine-option active" data-engine="auto">
                                    <div class="engine-icon">
                                        <i class="fas fa-robot"></i>
                                    </div>
                                    <div class="engine-info">
                                        <div class="engine-name">自动选择</div>
                                        <div class="engine-desc">根据环境配置自动选择最佳引擎</div>
                                    </div>
                                    <div class="engine-badge">推荐</div>
                                </div>
                                <div class="engine-option" data-engine="openai_vl">
                                    <div class="engine-icon">
                                        <i class="fas fa-brain"></i>
                                    </div>
                                    <div class="engine-info">
                                        <div class="engine-name">OpenAI VL</div>
                                        <div class="engine-desc">使用视觉语言模型，适合机械图纸</div>
                                    </div>
                                    <div class="engine-badge new">AI</div>
                                </div>
                                <div class="engine-option" data-engine="paddleocr">
                                    <div class="engine-icon">
                                        <i class="fas fa-eye"></i>
                                    </div>
                                    <div class="engine-info">
                                        <div class="engine-name">PaddleOCR</div>
                                        <div class="engine-desc">传统OCR引擎，速度快精度高</div>
                                    </div>
                                </div>
                            </div>

                            <!-- 提示词选项（仅OpenAI VL显示） -->
                            <div class="prompt-options" id="promptOptions" style="display: none;">
                                <div class="option-group">
                                    <label class="option-label">提示词模板:</label>
                                    <select class="option-select" id="promptSelect">
                                        <option value="mechanical_drawing_standard">机械图纸标准识别</option>
                                        <option value="mechanical_drawing_detailed">机械图纸详细识别</option>
                                        <option value="dimension_extraction">尺寸标注提取</option>
                                        <option value="title_block_extraction">标题栏信息提取</option>
                                        <option value="technical_requirements">技术要求提取</option>
                                    </select>
                                </div>
                                <div class="option-group">
                                    <label class="option-label">
                                        <input type="checkbox" id="useCustomPrompt" class="option-checkbox">
                                        使用自定义提示词
                                    </label>
                                    <textarea id="customPrompt" class="custom-prompt-textarea" placeholder="在此输入自定义提示词..." disabled></textarea>
                                </div>
                                <div class="option-group">
                                    <label class="option-label">
                                        <input type="checkbox" id="includeRawResponse" class="option-checkbox">
                                        包含原始API响应
                                    </label>
                                </div>
                            </div>
                        </div>

                    </div>

                    <!-- 右侧列：提示词输入 + 输出结果 -->
                    <div class="right-column">
                        <div class="results-section card">
                            <div class="section-header">
                                <div>
                                    <h2><i class="fas fa-comment-dots"></i> 智能场景</h2>
                                    <p style="margin: 4px 0 0; font-size: 12px; color: var(--admin-muted, #667085);">AI 图像智能识别分析</p>
                                </div>
                            </div>
                            
                            <div class="prompt-preset-buttons">
                                <button class="preset-btn active" data-image="static/images/demo/4.png|static/images/demo/26.jpg|static/images/demo/27.png|static/images/demo/29.png" data-prompt-key="mechanical">
                                    <i class="fas fa-image"></i> 工业图纸
                                </button>
                                <button class="preset-btn" data-image="static/images/demo/6.png|static/images/demo/6-2.png|static/images/demo/28.jpeg" data-prompt-key="document">
                                    <i class="fas fa-id-card"></i> 证件识别
                                </button>
                                <button class="preset-btn" data-image="static/images/demo/5.png|static/images/demo/35.png|static/images/demo/36.png" data-prompt-key="ticket">
                                    <i class="fas fa-file-invoice"></i> 票据
                                </button>
                                <button class="preset-btn" data-image="static/images/demo/8.jpeg|static/images/demo/51.png|static/images/demo/52.png" data-prompt-key="invoice">
                                    <i class="fas fa-wave-square"></i> 电子发票
                                </button>
                                <button class="preset-btn" data-image="static/images/demo/1.jpeg" data-prompt-key="gas_meter">
                                    <i class="fas fa-fire"></i> 燃气计量
                                </button>
                                <button class="preset-btn" data-image="static/images/demo/2.jpeg|static/images/demo/37.png" data-prompt-key="dial_gauge">
                                    <i class="fas fa-ruler-horizontal"></i> 百分表
                                </button>
                                <button class="preset-btn" data-image="static/images/demo/33.png|static/images/demo/34.png|static/images/demo/3.jpeg" data-prompt-key="digital_meter">
                                    <i class="fas fa-wave-square"></i> 电子数显表
                                </button>
                                <button class="preset-btn" data-image="static/images/demo/7.png" data-prompt-key="safety_helmet">
                                    <i class="fas fa-wave-square"></i> 安全帽识别
                                </button>
                                <button class="preset-btn" data-image="static/images/demo/43.png|static/images/demo/32.png|static/images/demo/22.png" data-prompt-key="wire_rope">
                                    <i class="fas fa-cable-car"></i> 钢丝绳缺陷检测
                                </button>
                                <button class="preset-btn" data-image="static/images/demo/23.png|static/images/demo/31.png" data-prompt-key="thread_seal">
                                    <i class="fas fa-tape"></i> 接口缠生料带
                                </button>
                                <button class="preset-btn" data-image="static/images/demo/24.png|static/images/demo/44.png" data-prompt-key="ppe">
                                    <i class="fas fa-hard-hat"></i> 穿戴安全检测
                                </button>
                                <button class="preset-btn" data-image="static/images/demo/45.png|static/images/demo/46.png" data-prompt-key="hot_work_ppe">
                                    <i class="fas fa-fire-extinguisher"></i> 防火穿戴合规
                                </button>
                                <button class="preset-btn" data-image="static/images/demo/47.png|static/images/demo/50.png|static/images/demo/48.png|static/images/demo/49.png" data-prompt-key="cable">
                                    <i class="fas fa-bolt"></i> 电缆线检测
                                </button>
                                <button class="preset-btn" data-image="static/images/demo/25.png|static/images/demo/30.png" data-prompt-key="object_count">
                                    <i class="fas fa-boxes"></i> 物品识别
                                </button>
                                <button class="preset-btn" data-image="static/images/demo/38.png|static/images/demo/39.png|static/images/demo/40.png|static/images/demo/41.png|static/images/demo/42.png" data-prompt-key="rust_removal">
                                    <i class="fas fa-tools"></i> 钢管焊口除锈
                                </button>
                            </div>
                            
                            <div class="prompt-input-area">
                                <div class="prompt-input-header">
                                    <i class="fas fa-pen"></i>
                                    <span>提示词</span>
                                    <button class="btn btn-sm btn-copy" onclick="copyPromptText()" title="复制提示词" style="margin-left: auto;">
                                        <i class="fas fa-copy"></i>
                                    </button>
                                </div>
                                <textarea id="rightPromptInput" class="prompt-textarea"
                                    placeholder="选择上方预设提示词，或在此直接输入自定义提示词..."></textarea>
                            </div>

                            <div class="output-divider"></div>

                            <div class="output-area">
                                <div class="output-header">
                                    <i class="fas fa-file-alt"></i>
                                    <span>输出结果</span>
                                </div>
                                <!-- 结果区域：左图右JSON -->
                                <div class="result-split-layout" id="resultSplitLayout" style="display: none;">
                                    <!-- 左侧：结果图片 -->
                                    <div class="result-image-panel">
                                        <div class="result-image-header">
                                            <i class="fas fa-image"></i>
                                            <span>标注结果图</span>
                                            <span class="result-image-hint">点击图片可放大</span>
                                        </div>
                                        <div class="result-image-container">
                                            <img id="resultImage" src="" alt="识别结果图片" class="result-image" onclick="openFullscreenViewer(this.src)">
                                            <div class="result-image-overlay">
                                                <i class="fas fa-search-plus"></i>
                                                <span>点击放大</span>
                                            </div>
                                        </div>
                                    </div>
                                    <!-- 右侧：JSON/文本结果（可切换） -->
                                    <div class="result-json-panel">
                                        <div class="result-json-header">
                                            <i class="fas fa-code"></i>
                                            <span>识别结果</span>
                                            <div class="result-tab-buttons">
                                                <button class="result-tab-btn active" data-tab="json" onclick="switchResultTab('json')">JSON</button>
                                                <button class="result-tab-btn" data-tab="raw" onclick="switchResultTab('raw')">原文</button>
                                            </div>
                                            <button class="btn btn-sm btn-copy" onclick="copyJsonResult()" title="复制内容">
                                                <i class="fas fa-copy"></i>
                                            </button>
                                        </div>
                                        <div id="outputContent" style="padding: 20px; background: #f8f9fa; border-radius: 8px; max-height: 600px; overflow-y: auto; font-family: monospace; font-size: 14px; line-height: 1.8; border: 1px solid #ddd;"></div>
                                    </div>
                                </div>
                                <!-- 兼容旧版纯文本输出（无坐标数据时显示） -->
                                <textarea id="outputContentFallback" class="output-textarea" placeholder="识别完成后，输出结果将显示在这里..." readonly style="display: none;"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <!-- 公共底部（由 layout.js 动态加载） -->
        <div id="footer-placeholder"></div>
    </div>

    <!-- JavaScript文件 -->
    <script src="static/js/layout.js"></script>
    <script src="static/js/main.js"></script>
    <script>
        // 每个场景的动态统计配置
        const SCENE_STATS_CONFIG = {
            mechanical: [
                { icon: 'fas fa-ruler-combined', label: '尺寸标注', key: 'dimensions', color: '#3498db' },
                { icon: 'fas fa-shapes', label: '形位公差', key: 'tolerances', color: '#e74c3c' },
                { icon: 'fas fa-list-ol', label: '识别项数', key: 'total_items', color: '#2ecc71' },
                { icon: 'fas fa-stopwatch', label: '处理时间', key: 'processing_time', color: '#f39c12' }
            ],
            document: [
                { icon: 'fas fa-id-card', label: '证件类型', key: 'document_type', color: '#3498db', isText: true },
                { icon: 'fas fa-user', label: '姓名识别', key: 'has_name', color: '#2ecc71', isBool: true },
                { icon: 'fas fa-fingerprint', label: '证件号码', key: 'has_id_number', color: '#e74c3c', isBool: true },
                { icon: 'fas fa-stopwatch', label: '处理时间', key: 'processing_time', color: '#f39c12' }
            ],
            ticket: [
                { icon: 'fas fa-ticket-alt', label: '票据类型', key: 'ticket_type', color: '#3498db', isText: true },
                { icon: 'fas fa-route', label: '出发站', key: 'departure', color: '#2ecc71', isText: true },
                { icon: 'fas fa-flag-checkered', label: '到达站', key: 'arrival', color: '#e74c3c', isText: true },
                { icon: 'fas fa-stopwatch', label: '处理时间', key: 'processing_time', color: '#f39c12' }
            ],
            invoice: [
                { icon: 'fas fa-file-invoice', label: '发票类型', key: 'invoice_type', color: '#3498db', isText: true },
                { icon: 'fas fa-dollar-sign', label: '合计金额', key: 'total_amount', color: '#2ecc71', isText: true },
                { icon: 'fas fa-percentage', label: '合计税额', key: 'total_tax', color: '#e74c3c', isText: true },
                { icon: 'fas fa-stopwatch', label: '处理时间', key: 'processing_time', color: '#f39c12' }
            ],
            gas_meter: [
                { icon: 'fas fa-tachometer-alt', label: '当前读数', key: 'main_reading', color: '#3498db', isText: true },
                { icon: 'fas fa-ruler', label: '单位', key: 'unit', color: '#2ecc71', isText: true },
                { icon: 'fas fa-industry', label: '品牌', key: 'brand', color: '#9b59b6', isText: true },
                { icon: 'fas fa-stopwatch', label: '处理时间', key: 'processing_time', color: '#f39c12' }
            ],
            dial_gauge: [
                { icon: 'fas fa-compass', label: '仪表类型', key: 'device_type', color: '#3498db', isText: true },
                { icon: 'fas fa-arrow-circle-right', label: '指针读数', key: 'pointer_reading', color: '#2ecc71', isText: true },
                { icon: 'fas fa-ruler-horizontal', label: '量程', key: 'range', color: '#e74c3c', isText: true },
                { icon: 'fas fa-stopwatch', label: '处理时间', key: 'processing_time', color: '#f39c12' }
            ],
            digital_meter: [
                { icon: 'fas fa-digital-tachograph', label: '设备类型', key: 'device_type', color: '#3498db', isText: true },
                { icon: 'fas fa-calculator', label: '主读数', key: 'main_reading', color: '#2ecc71', isText: true },
                { icon: 'fas fa-ruler', label: '单位', key: 'unit', color: '#9b59b6', isText: true },
                { icon: 'fas fa-stopwatch', label: '处理时间', key: 'processing_time', color: '#f39c12' }
            ],
            safety_helmet: [
                { icon: 'fas fa-users', label: '总人数', key: 'total_person_count', color: '#3498db' },
                { icon: 'fas fa-exclamation-triangle', label: '未佩戴', key: 'safety_violation_count', color: '#e74c3c' },
                { icon: 'fas fa-check-circle', label: '合规状态', key: 'compliance_status', color: '#2ecc71', isText: true },
                { icon: 'fas fa-stopwatch', label: '处理时间', key: 'processing_time', color: '#f39c12' }
            ],
            wire_rope: [
                { icon: 'fas fa-bug', label: '缺陷数量', key: 'defect_count', color: '#e74c3c' },
                { icon: 'fas fa-exclamation-circle', label: '严重缺陷', key: 'critical_defects', color: '#c0392b' },
                { icon: 'fas fa-shield-alt', label: '安全状态', key: 'overall_status', color: '#2ecc71', isText: true },
                { icon: 'fas fa-stopwatch', label: '处理时间', key: 'processing_time', color: '#f39c12' }
            ],
            thread_seal: [
                { icon: 'fas fa-tape', label: '缠绕质量', key: 'tape_quality', color: '#3498db', isText: true },
                { icon: 'fas fa-grip-lines', label: '外露丝扣', key: 'exposed_threads', color: '#e74c3c', isText: true },
                { icon: 'fas fa-check-circle', label: '综合判定', key: 'overall_result', color: '#2ecc71', isText: true },
                { icon: 'fas fa-stopwatch', label: '处理时间', key: 'processing_time', color: '#f39c12' }
            ],
            ppe: [
                { icon: 'fas fa-users', label: '人员数量', key: 'person_count', color: '#3498db' },
                { icon: 'fas fa-hard-hat', label: '检测装备', key: 'detected_ppe_count', color: '#2ecc71' },
                { icon: 'fas fa-exclamation-triangle', label: '缺失装备', key: 'missing_ppe_count', color: '#e74c3c' },
                { icon: 'fas fa-stopwatch', label: '处理时间', key: 'processing_time', color: '#f39c12' }
            ],
            hot_work_ppe: [
                { icon: 'fas fa-fire-extinguisher', label: '防火服', key: 'fireproof_clothing', color: '#e74c3c', isText: true },
                { icon: 'fas fa-glasses', label: '防护面罩', key: 'face_shield', color: '#3498db', isText: true },
                { icon: 'fas fa-check-circle', label: '综合判定', key: 'overall_result', color: '#2ecc71', isText: true },
                { icon: 'fas fa-stopwatch', label: '处理时间', key: 'processing_time', color: '#f39c12' }
            ],
            cable: [
                { icon: 'fas fa-bolt', label: '绝缘状态', key: 'insulation_status', color: '#3498db', isText: true },
                { icon: 'fas fa-bug', label: '缺陷数量', key: 'defect_count', color: '#e74c3c' },
                { icon: 'fas fa-shield-alt', label: '综合判定', key: 'overall_result', color: '#2ecc71', isText: true },
                { icon: 'fas fa-stopwatch', label: '处理时间', key: 'processing_time', color: '#f39c12' }
            ],
            object_count: [
                { icon: 'fas fa-boxes', label: '总物品数', key: 'total_count', color: '#3498db' },
                { icon: 'fas fa-layer-group', label: '物品类别', key: 'category_count', color: '#2ecc71' },
                { icon: 'fas fa-question-circle', label: '不确定项', key: 'uncertain_count', color: '#f39c12' },
                { icon: 'fas fa-stopwatch', label: '处理时间', key: 'processing_time', color: '#95a5a6' }
            ],
            rust_removal: [
                { icon: 'fas fa-tools', label: '除锈等级', key: 'rust_removal_grade', color: '#3498db', isText: true },
                { icon: 'fas fa-percentage', label: '清理面积', key: 'cleaned_area_ratio', color: '#2ecc71', isText: true },
                { icon: 'fas fa-check-circle', label: '综合判定', key: 'overall_result', color: '#e74c3c', isText: true },
                { icon: 'fas fa-stopwatch', label: '处理时间', key: 'processing_time', color: '#f39c12' }
            ]
        };

        const COORDINATE_OUTPUT_RULES = [
            '输出规则（必须严格遵守）：',

                const blob = await response.blob();
                const file = new File([blob], '4.png', { type: 'image/png' });

        // 加载指定路径的图片
        async function loadImageByPath(imagePath) {
            try {
                const response = await fetch(imagePath);
                const blob = await response.blob();
                const fileName = imagePath.split('/').pop();
                const fileType = fileName.endsWith('.png') ? 'image/png' : 'image/jpeg';
                const file = new File([blob], fileName, { type: fileType });
                if (typeof previewFile === 'function') {
                    previewFile(file);
                }
            } catch (err) {
                console.warn('加载图片失败:', imagePath, err);
            }
        }

        // 更新动态统计卡片
        function updateDynamicStats(data, processingTimeMs) {
            const container = document.getElementById('dynamicStatsContainer');
            if (!container) return;

            // 获取当前激活的场景
            const activeBtn = document.querySelector('.preset-btn.active');
            const sceneKey = activeBtn ? activeBtn.getAttribute('data-prompt-key') : 'mechanical';

            // 获取该场景的统计配置
            const statsConfig = SCENE_STATS_CONFIG[sceneKey] || SCENE_STATS_CONFIG.mechanical;

            // 从API返回的数据中提取信息
            const results = data.results || {};
            const rawText = data.raw_text || '';
            const textItems = results.text_items || [];
            const imageInfo = results.image_info || {};

            // 解析JSON结果以提取结构化数据
            let parsedData = {};
            try {
                // 尝试从raw_text中提取JSON对象（大模型可能在文本中返回JSON）
                const jsonMatch = rawText.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    parsedData = JSON.parse(jsonMatch[0]);
                }
            } catch (e) {
                console.warn('无法解析JSON数据:', e);
            }

            // 清空容器
            container.innerHTML = '';

            // 根据配置生成统计卡片
            statsConfig.forEach(function(stat) {
                let value = '';

                if (stat.key === 'processing_time') {
                    // 处理时间
                    value = (processingTimeMs / 1000).toFixed(2) + 's';
                } else if (stat.key === 'total_items') {
                    // 识别项数 - 从text_items数组长度获取
                    value = textItems.length || 0;
                } else if (stat.key === 'dimensions') {
                    // 尺寸标注数量 - 从text_items中筛选type为"尺寸标注"的
                    value = textItems.filter(item =>
                        (item.type || '').includes('尺寸') ||
                        (item.text || '').match(/\d+(\.\d+)?/)
                    ).length;
                } else if (stat.key === 'tolerances') {
                    // 形位公差数量 - 从text_items中筛选
                    value = textItems.filter(item =>
                        (item.type || '').includes('公差') ||
                        (item.type || '').includes('形位')
                    ).length;
                } else if (stat.key === 'defect_count') {
                    // 缺陷数量 - 从text_items或raw_text中统计
                    const defectItems = textItems.filter(item =>
                        (item.type || '').match(/缺陷|断丝|磨损|变形|锈蚀|破损|裂纹/i)
                    );
                    value = defectItems.length || (rawText.match(/缺陷|断丝|磨损|变形|锈蚀|破损|裂纹/gi) || []).length;
                } else if (stat.key === 'critical_defects') {
                    // 严重缺陷
                    const criticalItems = textItems.filter(item =>
                        (item.type || '').match(/严重|危险|critical/i)
                    );
                    value = criticalItems.length || (rawText.match(/严重|危险|critical/gi) || []).length;
                } else if (stat.key === 'total_person_count') {
                    // 总人数 - 从parsedData中获取
                    value = parsedData.total_person_count || parsedData.person_count ||
                            (rawText.match(/总人数[：:]\s*(\d+)/i) || [])[1] || 0;
                } else if (stat.key === 'safety_violation_count') {
                    // 未佩戴人数
                    value = parsedData.safety_violation_count ||
                            (rawText.match(/未佩戴[：:]\s*(\d+)/i) || [])[1] || 0;
                } else if (stat.key === 'detected_ppe_count') {
                    // 检测到的PPE装备数量
                    const ppeItems = textItems.filter(item =>
                        (item.type || '').match(/安全帽|安全带|防护服|手套|护目镜|防滑鞋/i)
                    );
                    value = ppeItems.length;
                } else if (stat.key === 'missing_ppe_count') {
                    // 缺失装备数量
                    value = parsedData.missing_ppe ? (Array.isArray(parsedData.missing_ppe) ? parsedData.missing_ppe.length : 0) : 0;
                } else if (stat.key === 'category_count') {
                    // 物品类别数量
                    value = parsedData.category_counts ? Object.keys(parsedData.category_counts).length : 0;
                } else if (stat.key === 'uncertain_count') {
                    // 不确定项数量
                    value = parsedData.uncertain_items ? (Array.isArray(parsedData.uncertain_items) ? parsedData.uncertain_items.length : 0) : 0;
                } else if (stat.key === 'total_count') {
                    // 总物品数
                    value = parsedData.total_count || textItems.length || 0;
                } else if (stat.isBool) {
                    // 布尔类型 - 检查是否存在
                    let fieldValue = parsedData[stat.key];
                    // 对于特殊的布尔字段，从text_items中判断
                    if (stat.key === 'has_name') {
                        fieldValue = parsedData.name !== undefined && parsedData.name !== null && parsedData.name !== '';
                    } else if (stat.key === 'has_id_number') {
                        fieldValue = parsedData.id_number !== undefined && parsedData.id_number !== null && parsedData.id_number !== '';
                    }
                    value = fieldValue ? '是' : '否';
                } else if (stat.isText) {
                    // 文本类型 - 直接从解析的数据中获取
                    let fieldValue = parsedData[stat.key];

                    // 特殊处理某些字段
                    if (!fieldValue && stat.key === 'departure') {
                        fieldValue = parsedData.departure_station;
                    } else if (!fieldValue && stat.key === 'arrival') {
                        fieldValue = parsedData.arrival_station;
                    } else if (!fieldValue && stat.key === 'tape_quality') {
                        fieldValue = parsedData.tape_wrapping_quality;
                    } else if (!fieldValue && stat.key === 'exposed_threads') {
                        fieldValue = parsedData.exposed_thread_count;
                    } else if (!fieldValue && stat.key === 'face_shield') {
                        fieldValue = parsedData.face_shield_or_goggles;
                    }

                    if (fieldValue !== undefined && fieldValue !== null && fieldValue !== '') {
                        value = String(fieldValue).substring(0, 20); // 限制长度
                        if (String(fieldValue).length > 20) value += '...';
                    } else {
                        value = '-';
                    }
                } else {
                    // 数值类型 - 从parsedData中获取
                    const fieldValue = parsedData[stat.key];
                    value = (fieldValue !== undefined && fieldValue !== null) ? fieldValue : 0;
                }

                // 创建统计卡片
                const card = document.createElement('div');
                card.className = 'summary-card';
                card.innerHTML = `
                    <div class="summary-card-icon" style="color: ${stat.color};">
                        <i class="${stat.icon}"></i> ${stat.label}
                    </div>
                    <div class="summary-card-content">
                        <div class="summary-card-value">${value}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 调用后端自定义提示词接口，处理并显示结果
        async function processWithPrompt(prompt) {
            const outputContent = document.getElementById('outputContent');
            const outputFallback = document.getElementById('outputContentFallback');
            const resultSplitLayout = document.getElementById('resultSplitLayout');
            const resultImage = document.getElementById('resultImage');
            const processBtn = document.getElementById('imageOcrProcessBtn');
            const loadingIndicator = document.getElementById('ocrLoadingIndicator');
            const statsCard = document.getElementById('ocrStatsCard');
            const startTime = Date.now();
            
            if (!prompt) {
                alert('请输入提示词');
                return;
            }

            // 检查是否有已选择的文件
            if (!currentFile) {
                alert('请先选择图片');
                return;
            }

            if (processBtn) {
                processBtn.disabled = true;
                processBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 检测中...';
            }
            if (loadingIndicator) loadingIndicator.classList.add('active');
            if (statsCard) statsCard.style.display = 'none';

            if (!currentFile.serverFilename) {
                await handleUpload({ silent: true, enableProcess: false });
            }

            if (!currentFile || !currentFile.serverFilename) {
                alert('图片上传失败，请重新上传');
                if (processBtn) {
                    processBtn.disabled = false;
                    processBtn.innerHTML = '<i class="fas fa-search"></i> 开始检测';
                }
                if (loadingIndicator) loadingIndicator.classList.remove('active');
                return;
            }

            // 显示检测中状态 - 动画效果
            resultSplitLayout.style.display = 'flex';
            outputFallback.style.display = 'none';
            if (loadingIndicator) loadingIndicator.classList.add('active');
            if (statsCard) statsCard.style.display = 'none';
            
            // 左侧图片区域显示加载动画
            resultImage.src = '';
            resultImage.alt = '检测中...';
            var imageContainer = document.querySelector('.result-image-container');
            if (imageContainer) {
                imageContainer.innerHTML = '<div class="result-loading"><div class="result-loading-spinner"><i class="fas fa-spinner fa-pulse fa-3x"></i></div><div class="result-loading-text">正在检测中...</div></div>';
            }

            // 右侧JSON区域显示加载动画
            clearJSON("outputContent");

            // 按钮旋转动画
            if (processBtn) {
                processBtn.disabled = true;
                processBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 检测中...';
            }

            // 更新左侧进度条
            if (typeof updateProgress === 'function') {
                updateProgress(60, '正在使用自定义提示词检测...');
            }
            if (typeof updateStatus === 'function') {
                updateStatus('process', 'active');
            }

            try {
                const response = await fetch(getApiBaseUrl() + '/api/process/custom', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        filename: currentFile.serverFilename,
                        prompt: prompt
                    })
                });

                const data = await response.json();

                if (!response.ok || data.error) {
                    throw new Error(data.error || `请求失败: ${response.status}`);
                }

                // 保存 raw_text、json_result 和 output_dir 供切换使用
                window._lastRawText = data.raw_text || '';
                window._lastJsonResult = data.json_result || '';
                window._outputDir = (data.json_result && data.json_result.output_dir) || '';
                console.log('Output Dir:', window._outputDir);

                // 更新动态统计
                updateDynamicStats(data, Date.now() - startTime);
                if (statsCard) statsCard.style.display = 'block';
                
                // 判断是否有结果图片和JSON数据
                if (data.result_image && data.json_result) {
                    // 恢复图片容器
                    if (imageContainer) {
                        imageContainer.innerHTML = '<img id="resultImage" src="" alt="识别结果图片" class="result-image" onclick="openFullscreenViewer(this.src)"><div class="result-image-overlay"><i class="fas fa-search-plus"></i><span>点击放大</span></div>';
                    }
                    var newResultImage = document.getElementById('resultImage');
                    if (newResultImage) {
                        newResultImage.src = data.result_image;
                    }

                    // 默认显示JSON结果
                    displayJSON('outputContent', data.json_result);
                    // 重置tab状态为JSON
                    document.querySelectorAll('.result-tab-btn').forEach(function(btn) {
                        btn.classList.toggle('active', btn.dataset.tab === 'json');
                    });
                    
                } else {
                    // 兼容旧版：只显示纯文本
                    resultSplitLayout.style.display = 'none';
                    outputFallback.style.display = 'block';
                    if (data.raw_text) {
                        outputFallback.value = data.raw_text;
                    } else {
                        outputFallback.value = '未获取到识别结果';
                    }
                }

                // 更新进度
                if (typeof updateProgress === 'function') {
                    updateProgress(100, '处理完成');
                }
                if (typeof updateStatus === 'function') {
                    updateStatus('process', 'completed');
                    updateStatus('results', 'completed');
                }

            } catch (error) {
                console.error('自定义提示词处理失败:', error);
                resultSplitLayout.style.display = 'none';
                outputFallback.style.display = 'block';
                outputFallback.value = '处理失败: ' + error.message;
                
                if (typeof updateProgress === 'function') {
                    updateProgress(0, '处理失败');
                }
                if (typeof updateStatus === 'function') {
                    updateStatus('process', 'error');
                }
            } finally {
                // 恢复按钮状态
                if (processBtn) {
                    processBtn.disabled = false;
                    processBtn.innerHTML = '<i class="fas fa-search"></i> 开始检测';
                }
                if (loadingIndicator) loadingIndicator.classList.remove('active');
            }
        }

        // 切换结果Tab（JSON / 原文）
        function switchResultTab(tab) {
            const outputContent = document.getElementById('outputContent');
            // 更新按钮状态
            document.querySelectorAll('.result-tab-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });
            // 切换内容
            if (tab === 'json') {
                displayJSON("outputContent", window._lastJsonResult);
            } else {
                // 渲染 Markdown
                if (window._lastRawText && typeof marked !== 'undefined') {
                    var html = marked.parse(window._lastRawText);
                    // 修复图片路径：<img src="images/xxx.jpg"> -> <img src="/uploads/mineru_xxx/images/xxx.jpg">
                    if (window._outputDir) {
                        var match = window._outputDir.match(/mineru_[^\\\/]+/);
                        if (match) {
                            // 替换所有 src="images/ 和 src='images/
                            html = html.replace(/src=["']images\//g, 'src="/uploads/' + match[0] + '/images/');
                        }
                    }
                    outputContent.innerHTML = html;
                } else {
                    outputContent.textContent = window._lastRawText || '';
                }
            }
        }

        // 复制提示词到剪贴板
        function copyPromptText() {
            const promptInput = document.getElementById('rightPromptInput');
            const text = promptInput ? promptInput.value : '';
            if (!text) {
                showCopyToast('提示词为空，无法复制');
                return;
            }
            copyToClipboard(text, '提示词已复制到剪贴板');
        }

        // 复制当前结果到剪贴板（根据当前激活的tab复制对应内容）
        function copyJsonResult() {
            const outputContent = document.getElementById('outputContent');
            const text = outputContent.value;
            if (!text) {
                return;
            }
            
            // 判断当前激活的是哪个tab
            var activeTab = document.querySelector('.result-tab-btn.active');
            var tabName = activeTab ? activeTab.dataset.tab : 'json';
            var label = tabName === 'json' ? 'JSON' : '原文';
            
            copyToClipboard(text, label + ' 已复制到剪贴板');
        }

        // 通用复制函数
        function copyToClipboard(text, successMessage) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(function() {
                    showCopyToast(successMessage || '已复制到剪贴板');
                }).catch(function() {
                    fallbackCopyText(text, successMessage);
                });
            } else {
                fallbackCopyText(text, successMessage);
            }
        }

        function fallbackCopyText(text, successMessage) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                showCopyToast(successMessage || '已复制到剪贴板');
            } catch (e) {
                showCopyToast('复制失败，请手动选择复制');
            }
            document.body.removeChild(textarea);
        }

        // 显示复制成功提示
        function showCopyToast(message) {
            let toast = document.getElementById('copyToast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'copyToast';
                toast.className = 'copy-toast';
                document.body.appendChild(toast);
            }
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(function() {
                toast.classList.remove('show');
            }, 2000);
        }

        // ESC键关闭Lightbox
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });

        // 更新示例图片网格
        function updateSampleGrid(imagePaths) {
            var grid = document.getElementById('sampleGrid');
            if (!grid) return;
            grid.innerHTML = '';
            imagePaths.forEach(function(path, idx) {
                var fileName = path.split('/').pop();
                var item = document.createElement('div');
                item.className = 'sample-item' + (idx === 0 ? ' selected' : '');
                item.setAttribute('data-src', path);
                item.innerHTML = '<img src="' + path + '" alt="' + fileName + '" loading="lazy">' +
                    '<span>' + fileName + '</span>';
                item.addEventListener('click', function() {
                    grid.querySelectorAll('.sample-item').forEach(function(si) {
                        si.classList.remove('selected');
                    });
                    this.classList.add('selected');
                    loadImageByPath(path);
                });
                grid.appendChild(item);
            });
        }

        // 预设提示词按钮功能 + 自定义处理逻辑
        document.addEventListener('DOMContentLoaded', function() {
            applyScenePrompts();

            var promptInput = document.getElementById('rightPromptInput');
            var presetBtns = document.querySelectorAll('.preset-btn');
            var processBtn = document.getElementById('imageOcrProcessBtn');
            var defaultActiveBtn = document.querySelector('.preset-btn.active');

            if (promptInput && defaultActiveBtn) {
                var defaultPrompt = defaultActiveBtn.getAttribute('data-prompt');
                if (defaultPrompt) {
                    promptInput.value = defaultPrompt;
                }
            }

            // 绑定"开始检测"按钮：调用自定义提示词接口
            if (processBtn) {
                processBtn.addEventListener('click', async function() {
                    var prompt = promptInput.value.trim();

                    // 显示扫描动画
                    const container = document.querySelector('.results-section');
                    if (container) {
                        container.style.position = 'relative';
                        let overlay = container.querySelector('.scanning-overlay');
                        if (!overlay) {
                            overlay = document.createElement('div');
                            overlay.className = 'scanning-overlay';
                            overlay.innerHTML = '<div class="scanning-content"><div class="scanning-animation"><div class="scan-line"></div></div><div class="scanning-text">正在识别中<span class="scanning-dots"></span></div></div>';
                            container.appendChild(overlay);
                        }
                        overlay.classList.add('active');
                        setTimeout(() => overlay.classList.remove('active'), 300000);
                    }

                    await processWithPrompt(prompt);

                    // 识别完成后隐藏动画
                    if (container) {
                        const overlay = container.querySelector('.scanning-overlay');
                        if (overlay) overlay.classList.remove('active');
                    }
                });
            }

            presetBtns.forEach(function(btn) {
                btn.addEventListener('click', function() {
                    // 移除所有按钮的 active 状态
                    presetBtns.forEach(function(b) {
                        b.classList.remove('active');
                    });
                    // 为当前点击的按钮添加 active 状态
                    this.classList.add('active');

                    var prompt = this.getAttribute('data-prompt');
                    if (prompt) {
                        promptInput.value = prompt;
                        // 清空上次的输出结果
                        var outputEl = document.getElementById('outputContent');
                        if (outputEl) {
                            outputEl.value = '';
                        }
                        // 隐藏结果分割布局，显示回退文本框
                        var splitLayout = document.getElementById('resultSplitLayout');
                        var fallbackEl = document.getElementById('outputContentFallback');
                        var statsCard = document.getElementById('ocrStatsCard');
                        var loadingIndicator = document.getElementById('ocrLoadingIndicator');
                        if (splitLayout) splitLayout.style.display = 'none';
                        if (statsCard) statsCard.style.display = 'none';
                        if (loadingIndicator) loadingIndicator.classList.remove('active');
                        if (fallbackEl) {
                            fallbackEl.value = '';
                            fallbackEl.style.display = 'none';
                        }
                        // 切换对应的图片
                        // 支持 data-image 属性，单张或多张用 | 分隔
                        var imageAttr = this.getAttribute('data-image');
                        if (imageAttr) {
                            var imagePaths = imageAttr.split('|').map(function(s) { return s.trim(); });
                            updateSampleGrid(imagePaths);
                            // 自动加载第一张
                            loadImageByPath(imagePaths[0]);
                        }
                    }
                });
            });

            // 页面加载后自动加载默认图片（电子数显表）
            loadDefaultImage();
            // 初始化示例图片网格（默认显示电子数显表的图片）
            if (defaultActiveBtn) {
                var imgAttr = defaultActiveBtn.getAttribute('data-image');
                if (imgAttr) {
                    var paths = imgAttr.split('|').map(function(s) { return s.trim(); });
                    updateSampleGrid(paths);
                }
            }
            // 默认图片加载后，启用多场景 OCR 的检测入口
            setTimeout(function() {
                if (processBtn) processBtn.disabled = false;
            }, 800);
        });
    </script>
