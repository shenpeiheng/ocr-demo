<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛意AI - 智能视觉识别平台</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet" href="static/css/all.min.css">
    <link id="favicon" rel="icon" href="static/images/favicon.ico" type="image/x-icon">
    <style>
        .home-page .content-grid {
            display: flex;
            flex-direction: column;
            padding: 20px;
            max-width: 100%;
            min-height: calc(100vh - 60px);
            margin: 0;
            position: relative;
            z-index: 1;
        }

        /* AI科技感背景 */
        .home-page::before {
            content: '';
            position: fixed;
            top: 60px;
            left: 240px;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(173, 6, 62, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(227, 111, 30, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(173, 6, 62, 0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite;
            transition: left 0.3s ease;
        }

        /* 侧边栏收起时背景调整 */
        .sidebar.is-collapsed ~ .main-content-area.home-page::before {
            left: 60px;
        }

        @keyframes bgPulse {
            0%, 100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        /* 动态网格线 */
        .tech-grid {
            position: fixed;
            top: 60px;
            left: 240px;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(173, 6, 62, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(173, 6, 62, 0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            opacity: 0.8;
            animation: gridMove 25s linear infinite;
            z-index: 0;
            transition: left 0.3s ease;
        }

        /* 侧边栏收起时网格调整 */
        body.sidebar-collapsed .tech-grid {
            left: 60px;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(60px, 60px);
            }
        }

        /* 浮动粒子效果 */
        .particle {
            position: fixed;
            background: radial-gradient(circle, rgba(173, 6, 62, 1), rgba(173, 6, 62, 0.3));
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: float linear infinite;
            z-index: 0;
            box-shadow: 0 0 20px rgba(173, 6, 62, 0.8), 0 0 40px rgba(173, 6, 62, 0.4);
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0) rotate(0deg);
                opacity: 0;
            }
            5% {
                opacity: 0.8;
            }
            95% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-20vh) scale(1.5) rotate(360deg);
                opacity: 0;
            }
        }

        /* AI扫描线效果 */
        .scan-line {
            position: fixed;
            left: 240px;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg,
                transparent,
                rgba(173, 6, 62, 0.8) 30%,
                rgba(173, 6, 62, 1) 50%,
                rgba(173, 6, 62, 0.8) 70%,
                transparent);
            box-shadow: 0 0 20px rgba(173, 6, 62, 0.8);
            pointer-events: none;
            z-index: 0;
            animation: scan 4s ease-in-out infinite;
            opacity: 0;
            transition: left 0.3s ease;
        }

        @keyframes scan {
            0%, 100% {
                top: 60px;
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            50% {
                top: 50%;
                opacity: 0.8;
            }
            90% {
                opacity: 0.8;
            }
            100% {
                top: 100%;
                opacity: 0;
            }
        }

        /* AI数据流效果 */
        .data-stream {
            position: fixed;
            width: 2px;
            height: 100px;
            background: linear-gradient(to bottom,
                transparent,
                rgba(173, 6, 62, 0.8),
                rgba(173, 6, 62, 1),
                transparent);
            pointer-events: none;
            z-index: 0;
            animation: stream linear infinite;
            opacity: 0;
        }

        @keyframes stream {
            0% {
                top: -100px;
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                top: 100vh;
                opacity: 0;
            }
        }

        /* 确保内容在背景之上 */
        .home-hero,
        .feature-module,
        .stats-module {
            position: relative;
            z-index: 1;
        }

        /* 页面加载动画 - 直接落下效果 */
        @keyframes dropDown {
            0% {
                opacity: 0;
                transform: translateY(-500px) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* 内部元素斜飞入效果 */
        @keyframes flyInDiagonal {
            from {
                opacity: 0;
                transform: translate(-80px, -80px) rotate(-15deg) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes fadeInRotate {
            from {
                opacity: 0;
                transform: perspective(600px) rotateY(-15deg) translateY(20px);
            }
            to {
                opacity: 1;
                transform: perspective(600px) rotateY(0) translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-100px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(100px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        @keyframes slideInBottom {
            from {
                opacity: 0;
                transform: translateY(80px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.5) rotate(-5deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotate(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        @keyframes glow {
            0%, 100% {
                box-shadow: 0 0 5px rgba(173, 6, 62, 0.3);
            }
            50% {
                box-shadow: 0 0 20px rgba(173, 6, 62, 0.6);
            }
        }

        /* Hero 区域 */
        .home-hero {
            background: white;
            border-radius: 8px;
            padding: 35px 40px;
            margin-bottom: 20px;
            border-left: 4px solid rgb(173, 6, 62);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            animation: fadeInUp 0.6s ease-out;
            position: relative;
            overflow: hidden;
        }

        .home-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(173, 6, 62, 0.05), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                left: -100%;
            }
            50%, 100% {
                left: 100%;
            }
        }

        .home-hero h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #303133;
            margin: 0 0 8px 0;
            letter-spacing: 0.5px;
            position: relative;
        }

        .home-hero h1 .brand-name {
            color: rgb(173, 6, 62);
            position: relative;
            display: inline-block;
        }

        .home-hero h1 .brand-name::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: rgb(173, 6, 62);
            animation: underline 2s ease-out forwards;
        }

        @keyframes underline {
            to {
                width: 100%;
            }
        }

        .home-hero p {
            font-size: 0.9rem;
            color: #606266;
            margin: 0;
            line-height: 1.6;
            position: relative;
        }

        /* AI智能图标动画 */
        .ai-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: linear-gradient(135deg, rgb(173, 6, 62), rgb(140, 5, 50));
            color: white;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-left: 10px;
            animation: pulse 2s ease-in-out infinite;
        }

        .ai-badge i {
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* 功能网格 */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            flex: 1;
            align-content: start;
        }

        .feature-module {
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            padding: 20px;
            transition: all 0.3s ease;
            opacity: 0;
        }

        /* 外层直接落下 - 依次落下 */
        .feature-module:nth-child(1) {
            animation: dropDown 0.6s ease-out 0.1s forwards;
        }

        .feature-module:nth-child(2) {
            animation: dropDown 0.6s ease-out 0.2s forwards;
        }

        .feature-module:nth-child(3) {
            animation: dropDown 0.6s ease-out 0.3s forwards;
        }

        .feature-module:nth-child(4) {
            animation: dropDown 0.6s ease-out 0.4s forwards;
        }

        .feature-module:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            border-color: rgb(173, 6, 62);
            transform: translateY(-5px);
        }

        .module-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f0f0;
            opacity: 0;
            animation: flyInDiagonal 0.6s ease-out 0.6s forwards;
        }

        .module-icon {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: white;
            transition: all 0.3s ease;
        }

        .feature-module:hover .module-icon {
            transform: scale(1.1) rotate(5deg);
            animation: glow 2s ease-in-out infinite;
        }

        .module-title {
            font-size: 1rem;
            font-weight: 600;
            color: #303133;
        }

        .module-count {
            font-size: 0.75rem;
            color: #909399;
            margin-left: auto;
            padding: 2px 8px;
            background: #f4f4f5;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .feature-module:hover .module-count {
            background: rgba(173, 6, 62, 0.1);
            color: rgb(173, 6, 62);
        }

        /* 功能列表 */
        .module-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .module-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            background: #f9fafb;
            text-decoration: none;
            color: #454b50;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.875rem;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: flyInDiagonal 0.5s ease-out forwards;
        }

        /* 为每个列表项添加递增延迟 */
        .module-item:nth-child(1) { animation-delay: 0.8s; }
        .module-item:nth-child(2) { animation-delay: 0.9s; }
        .module-item:nth-child(3) { animation-delay: 1s; }
        .module-item:nth-child(4) { animation-delay: 1.1s; }
        .module-item:nth-child(5) { animation-delay: 1.2s; }

        .module-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: rgb(173, 6, 62);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .module-item:hover::before {
            transform: scaleY(1);
        }

        .module-item:hover {
            background: #fef2f2;
            color: rgb(173, 6, 62);
            transform: translateX(5px);
            box-shadow: 0 2px 8px rgba(173, 6, 62, 0.1);
        }

        .module-item i {
            font-size: 0.875rem;
            width: 16px;
            text-align: center;
            color: rgb(173, 6, 62);
            transition: all 0.3s ease;
        }

        .module-item:hover i {
            transform: scale(1.2);
        }

        /* 统计模块 */
        .stats-module {
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            padding: 20px;
            opacity: 0;
            animation: dropDown 0.6s ease-out 0.4s forwards;
            transition: all 0.3s ease;
        }

        .stats-module:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            border-color: rgb(173, 6, 62);
            transform: translateY(-5px);
        }

        .stats-module:hover .module-icon {
            transform: scale(1.1) rotate(5deg);
            animation: glow 2s ease-in-out infinite;
        }

        .stats-module .module-header {
            margin-bottom: 20px;
            opacity: 0;
            animation: flyInDiagonal 0.6s ease-out 1.0s forwards;
        }

        .stats-grid {
            display: grid;
            grid-template-rows: repeat(2, 1fr);
            gap: 12px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            border-radius: 6px;
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: flyInDiagonal 0.5s ease-out forwards;
        }

        /* 统计项依次飞入 */
        .stat-item:nth-child(1) { animation-delay: 1.4s; }
        .stat-item:nth-child(2) { animation-delay: 1.5s; }
        .stat-item:nth-child(3) { animation-delay: 1.6s; }
        .stat-item:nth-child(4) { animation-delay: 1.7s; }

        .stat-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, transparent, rgba(173, 6, 62, 0.05));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stat-item:hover {
            background: #fff;
            border-color: rgb(173, 6, 62);
            box-shadow: 0 4px 12px rgba(173, 6, 62, 0.15);
            transform: scale(1.05);
        }

        .stat-item:hover::after {
            opacity: 1;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: rgb(173, 6, 62);
            margin-bottom: 4px;
            position: relative;
            z-index: 1;
        }

        .stat-item:hover .stat-value {
            animation: countUp 0.6s ease-out;
        }

        @keyframes countUp {
            0% {
                transform: translateY(10px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .stat-label {
            font-size: 0.75rem;
            color: #606266;
            position: relative;
            z-index: 1;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .feature-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .feature-grid {
                grid-template-columns: 1fr;
            }
            .home-hero h1 {
                font-size: 1.3rem;
            }
            .home-hero p {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 公共头部 -->
        <div id="header-placeholder"></div>

        <!-- 主体布局 -->
        <div class="main-layout">
            <!-- 公共侧边栏 -->
            <div id="sidebar-placeholder"></div>

            <!-- 主要内容区域 -->
            <main class="main-content-area home-page">

        <!-- 公共底部 -->

    </div>

    <!-- JavaScript文件 -->
    <script src="static/js/layout.js"></script>
    <script>
        // AI科技感粒子效果 - 增强版
        function createParticles() {
            const particleCount = 30; // 增加到30个
            const mainContent = document.querySelector('.main-content-area.home-page');

                mainContent.appendChild(particle);
            }
        }

        // AI数据流效果
        function createDataStreams() {
            const streamCount = 8;
            const mainContent = document.querySelector('.main-content-area.home-page');

            for (let i = 0; i < streamCount; i++) {
                const stream = document.createElement('div');
                stream.className = 'data-stream';

                // 随机水平位置
                stream.style.left = Math.random() * 100 + '%';

                // 随机动画持续时间 (3-6秒)
                const duration = Math.random() * 3 + 3;
                stream.style.animationDuration = duration + 's';

                // 随机延迟
                stream.style.animationDelay = Math.random() * 3 + 's';

                mainContent.appendChild(stream);
            }
        }

        // 页面加载后立即创建效果
        window.addEventListener('DOMContentLoaded', function() {
            createParticles();
            createDataStreams();
        });
    </script>
