version: '3.8'

services:
  ocr-demo:
    image: ocr-industrial-demo
    container_name: ocr-demo
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - DEBUG=false
      - PORT=5000
      - OCR_USE_MOCK=false
      - ENABLE_CORS=true
      - OMP_NUM_THREADS=4
      - NUMEXPR_NUM_THREADS=4
      - OPENBLAS_NUM_THREADS=4
      - MKL_NUM_THREADS=4
      - UPLOAD_FOLDER=/app/frontend/uploads
    volumes:
      - ./uploads:/app/frontend/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/api', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s