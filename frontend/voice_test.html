<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音识别测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-container {
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            background: #f0f0f0;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        .btn-primary {
            background: #007bff;
            color: white;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-primary:hover {
            background: #0056b3;
        }
        .btn-danger:hover {
            background: #c82333;
        }
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin: 10px 0;
        }
        .log {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            max-height: 300px;
            overflow-y: auto;
            font-size: 12px;
            font-family: monospace;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #007bff;
            background: white;
        }
    </style>
</head>
<body>
    <h1>🎤 语音识别诊断工具</h1>

    <div class="test-container">
        <h2>1. 浏览器兼容性检查</h2>
        <div id="compatibility"></div>
    </div>

    <div class="test-container">
        <h2>2. 麦克风权限检查</h2>
        <div id="permission-status" class="status">未检查</div>
        <button class="btn-primary" onclick="checkMicrophonePermission()">检查麦克风权限</button>
    </div>

    <div class="test-container">
        <h2>3. 语音识别测试</h2>
        <div id="recognition-status" class="status">未开始</div>
        <button id="startBtn" class="btn-primary" onclick="startRecognition()">开始录音</button>
        <button id="stopBtn" class="btn-danger" onclick="stopRecognition()" disabled>停止录音</button>

        <h3>识别结果：</h3>
        <textarea id="transcript" placeholder="识别的文字将显示在这里..."></textarea>

        <h3>详细日志：</h3>
        <div id="log" class="log"></div>
    </div>

    <script>
        let recognition = null;
        let isRecording = false;
        let finalTranscript = '';
        let interimTranscript = '';

        // 1. 检查浏览器兼容性
        function checkCompatibility() {
            const compatDiv = document.getElementById('compatibility');
            let html = '';

            // 检查 Web Speech API
            if ('webkitSpeechRecognition' in window) {
                html += '<div class="status success">✅ 浏览器支持 webkitSpeechRecognition（Chrome/Edge）</div>';
            } else if ('SpeechRecognition' in window) {
                html += '<div class="status success">✅ 浏览器支持 SpeechRecognition（标准API）</div>';
            } else {
                html += '<div class="status error">❌ 浏览器不支持语音识别API<br>请使用 Chrome、Edge 或其他支持的浏览器</div>';
            }

            // 检查 HTTPS
            if (window.location.protocol === 'https:' || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                html += '<div class="status success">✅ 运行在安全环境（HTTPS/localhost）</div>';
            } else {
                html += '<div class="status error">❌ 需要 HTTPS 或 localhost 环境<br>当前: ' + window.location.protocol + '//' + window.location.hostname + '</div>';
            }

            // 检查 MediaDevices API
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                html += '<div class="status success">✅ 浏览器支持 getUserMedia（麦克风访问）</div>';
            } else {
                html += '<div class="status error">❌ 浏览器不支持 getUserMedia API</div>';
            }

            compatDiv.innerHTML = html;
        }

        // 2. 检查麦克风权限
        async function checkMicrophonePermission() {
            const statusDiv = document.getElementById('permission-status');
            statusDiv.className = 'status info';
            statusDiv.textContent = '正在检查麦克风权限...';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                stream.getTracks().forEach(track => track.stop());
                statusDiv.className = 'status success';
                statusDiv.textContent = '✅ 麦克风权限已授予';
                addLog('麦克风权限检查通过');
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.textContent = '❌ 麦克风权限被拒绝或无法访问: ' + error.message;
                addLog('麦克风权限检查失败: ' + error.message, 'error');
            }
        }

        // 3. 开始语音识别
        function startRecognition() {
            const statusDiv = document.getElementById('recognition-status');
            const transcriptArea = document.getElementById('transcript');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');

            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('您的浏览器不支持语音识别功能！\n请使用 Chrome、Edge 或其他支持的浏览器。');
                return;
            }

            try {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();

                // 配置
                recognition.lang = 'zh-CN';
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.maxAlternatives = 1;

                addLog('创建 SpeechRecognition 实例成功');
                addLog('配置: lang=zh-CN, continuous=true, interimResults=true');

                // 事件监听
                recognition.onstart = function() {
                    isRecording = true;
                    statusDiv.className = 'status success';
                    statusDiv.textContent = '🎤 正在录音中... 请说话';
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    finalTranscript = '';
                    interimTranscript = '';
                    transcriptArea.value = '';
                    addLog('语音识别已启动', 'success');
                };

                recognition.onresult = function(event) {
                    interimTranscript = '';

                    addLog('收到识别结果，resultIndex=' + event.resultIndex + ', results.length=' + event.results.length);

                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const transcript = event.results[i][0].transcript;
                        const confidence = event.results[i][0].confidence;
                        const isFinal = event.results[i].isFinal;

                        addLog('结果 ' + i + ': "' + transcript + '" (isFinal=' + isFinal + ', confidence=' + (confidence || 'N/A') + ')');

                        if (isFinal) {
                            finalTranscript += transcript;
                            addLog('添加到最终结果: "' + transcript + '"', 'success');
                        } else {
                            interimTranscript += transcript;
                        }
                    }

                    transcriptArea.value = finalTranscript + interimTranscript;
                    addLog('显示文本: 最终=' + finalTranscript.length + '字, 临时=' + interimTranscript.length + '字');
                };

                recognition.onerror = function(event) {
                    addLog('❌ 识别错误: ' + event.error + ' - ' + (event.message || ''), 'error');
                    statusDiv.className = 'status error';

                    let errorMsg = '识别错误: ';
                    switch(event.error) {
                        case 'no-speech':
                            errorMsg += '没有检测到语音输入';
                            break;
                        case 'audio-capture':
                            errorMsg += '无法捕获音频（检查麦克风）';
                            break;
                        case 'not-allowed':
                            errorMsg += '麦克风权限被拒绝';
                            break;
                        case 'network':
                            errorMsg += '网络错误';
                            break;
                        case 'aborted':
                            errorMsg += '识别被中止';
                            break;
                        default:
                            errorMsg += event.error;
                    }
                    statusDiv.textContent = errorMsg;

                    isRecording = false;
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                };

                recognition.onend = function() {
                    addLog('语音识别已结束');
                    isRecording = false;
                    statusDiv.className = 'status info';
                    statusDiv.textContent = '录音已停止';
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                };

                recognition.onaudiostart = function() {
                    addLog('✅ 开始接收音频', 'success');
                };

                recognition.onaudioend = function() {
                    addLog('音频输入结束');
                };

                recognition.onsoundstart = function() {
                    addLog('✅ 检测到声音', 'success');
                };

                recognition.onsoundend = function() {
                    addLog('声音结束');
                };

                recognition.onspeechstart = function() {
                    addLog('✅ 检测到语音', 'success');
                };

                recognition.onspeechend = function() {
                    addLog('语音结束');
                };

                // 启动识别
                addLog('调用 recognition.start()...');
                recognition.start();

            } catch (error) {
                addLog('❌ 启动失败: ' + error.message, 'error');
                statusDiv.className = 'status error';
                statusDiv.textContent = '启动失败: ' + error.message;
            }
        }

        // 停止语音识别
        function stopRecognition() {
            if (recognition) {
                addLog('调用 recognition.stop()...');
                recognition.stop();
            }
        }

        // 添加日志
        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = 'log-entry';

            const timestamp = new Date().toLocaleTimeString('zh-CN', {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                fractionalSecondDigits: 3
            });

            let icon = 'ℹ️';
            if (type === 'success') icon = '✅';
            if (type === 'error') icon = '❌';

            entry.textContent = `[${timestamp}] ${icon} ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;

            console.log(`[语音识别] ${message}`);
        }

        // 页面加载时检查兼容性
        window.addEventListener('DOMContentLoaded', function() {
            checkCompatibility();
            addLog('诊断工具已加载');
        });
    </script>
</body>
</html>
