    <style>
        .contract-page .content-grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
            height: calc(100vh - 60px);
            padding: 20px;
            overflow: hidden;
        }
        .upload-panel, .results-panel {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }
        .panel-header {
            padding: 20px;
            border-bottom: 1px solid #e5e7eb;
        }
        .panel-header h2 {
            margin: 0;
            font-size: 1.1rem;
            color: #303133;
            font-weight: 600;
        }
        .upload-section {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }
        .upload-area {
            border: 2px dashed #dcdfe6;
            border-radius: 6px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            background: #fafbfc;
            margin-bottom: 15px;
        }
        .upload-area:hover {
            border-color: #ad063e;
        }
        .upload-area i {
            font-size: 2.5rem;
            color: #ad063e;
        }
        .file-info {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .btn {
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
        }
        .btn-primary {
            background: #ad063e;
            color: white;
        }
        .btn-primary:hover {
            background: #920535;
        }
        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .loading-indicator {
            display: none;
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-top: 15px;
        }
        .loading-indicator.active {
            display: block;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ad063e;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }

        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #e5e7eb;
            background: #f8f9fa;
        }
        .tab-btn {
            padding: 12px 25px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            color: #606266;
            border-bottom: 3px solid transparent;
        }
        .tab-btn.active {
            color: #ad063e;
            border-bottom-color: #ad063e;
            font-weight: 600;
        }
        .tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active {
            display: block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        table th {
            background: #f8f9fa;
            padding: 10px 8px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #e5e7eb;
        }
        table td {
            padding: 8px;
            border-bottom: 1px solid #e5e7eb;
        }

    <script>
        let currentFile = null;

        window.addEventListener('DOMContentLoaded', function() {
            loadSample();
        });

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            currentFile = file;
            showFileInfo(file);
        }

        async function loadSample() {
            const path = document.getElementById('sampleSelect').value;
            if (!path) return;

            const response = await fetch(path);
            const blob = await response.blob();
            currentFile = new File([blob], path.split('/').pop(), {type: 'application/pdf'});
            showFileInfo(currentFile);
        }

        function showFileInfo(file) {
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = (file.size / 1024).toFixed(2) + ' KB';
            document.getElementById('fileInfo').style.display = 'block';
            document.getElementById('recognizeBtn').disabled = false;
        }

        async function recognize() {
            if (!currentFile) return;

            document.getElementById('loading').classList.add('active');
            document.getElementById('recognizeBtn').disabled = true;

            try {
                // 步骤1: 上传文件
                const uploadFormData = new FormData();
                uploadFormData.append('file', currentFile);

                const uploadResponse = await fetch('/api/upload', {
                    method: 'POST',
                    body: uploadFormData
                });

                const uploadResult = await uploadResponse.json();
                if (!uploadResult.filename) {
                    throw new Error('文件上传失败');
                }

                // 步骤2: 使用MinerU处理PDF
                const processResponse = await fetch('/api/process', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        filename: uploadResult.filename,
                        pdf_engine: 'mineru',
                        dpi: 200,
                        max_pages: 10
                    })
                });

                const result = await processResponse.json();
                console.log('识别结果:', result);

                document.getElementById('loading').classList.remove('active');
                document.getElementById('recognizeBtn').disabled = false;

                if (result.success) {
                    displayResults(result);
                    alert('✅ PDF识别成功！请在表单中查看和编辑识别结果。');
                } else {
                    alert('⚠️ PDF识别失败（网络问题）\n\n' +
                          '错误信息：' + (result.error || '未知错误') + '\n\n' +
                          '提示：表单已准备好，您可以手动填写合同信息。');
                    // 即使识别失败，也切换到基本信息Tab，让用户手动填写
                    switchTab('basic');
                }

            } catch (error) {
                console.error('识别错误:', error);
                document.getElementById('loading').classList.remove('active');
                document.getElementById('recognizeBtn').disabled = false;
                alert('❌ 识别失败：' + error.message + '\n\n您可以手动填写表单。');
            }
        }

        function displayResults(result) {
            // 提取markdown文本
            let text = '';
            if (result.results && result.results.combined_results && result.results.combined_results.markdown) {
                text = result.results.combined_results.markdown;
            }

            console.log('识别成功，文本长度:', text.length);
            console.log('识别结果:', result);

            // 填充基本信息表单示例数据
            fillSampleBasicData();

            // 从PDF中提取表格数据填充到合同明细
            fillTableFromPDF(text, result);

            // 切换到基本信息Tab
            document.querySelectorAll('.tab-btn')[0].click();
        }

        function fillSampleBasicData() {
            // 填充基本信息表单（部分字段有值，部分留空）
            const inputs = document.querySelectorAll('#basicTab input[type="text"]');

            // 示例数据：只填充部分字段

        function parseTableFromPDFText(text) {
            const rows = [];

            console.log('========== 开始解析表格 ==========');
            console.log('文本总长度:', text.length);

            // 检查是HTML表格还是Markdown表格
            if (text.includes('<table>')) {
                console.log('检测到HTML表格格式');
                return parseHTMLTable(text);
            }

            // Markdown表格解析
            console.log('尝试解析Markdown表格格式');
            const lines = text.split('\n');
            let inTable = false;
            let headerPassed = false;

            let expectedCols = 0;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();

                if (line.includes('|') && !inTable) {
                    inTable = true;
                    headerPassed = false;
                }

                if (!inTable) continue;

                // 跳过分隔行（|---|）
                if (/^\|[-\s:|]+\|?$/.test(line)) {
                    headerPassed = true;
                    continue;
                }

                if (inTable && headerPassed && (!line || !line.includes('|'))) {
                    inTable = false;
                    continue;
                }

                // 跳过表头行
                if (headerPassed === false && (line.includes('序号') || line.includes('楼号') || line.includes('电梯分类'))) {
                    headerPassed = true;
                    continue;
                }

                if (!headerPassed) continue;

                // 解析数据行
                if (line.startsWith('|') && line.endsWith('|')) {
                    const cells = line.split('|')
                        .map(cell => cell.trim())
                        .filter((cell, idx, arr) => idx > 0 && idx < arr.length - 1);

                    // 第一行数据行确定期望列数
                    if (expectedCols === 0 && cells.length >= 4) {
                        expectedCols = cells.length;
                    }

                    // 如果某行列数少于期望值，说明楼号列合并为空，在楼号位置补空
                    if (expectedCols > 0 && cells.length < expectedCols && cells.length >= 4) {
                        cells.splice(1, 0, '');
                        console.log(`Markdown第${i}行缺少列（合并行），已在楼号位置补空`);
                    }

                    if (cells.length >= 4) {
                        const row = {
                            buildingNo: cells[1] || '',           // 楼号
                            elevatorType: cells[2] || '',         // 电梯分类
                            brand: cells[3] || '',                // 品牌
                            code: cells[4] || '',                 // 编号
                            spec: cells[5] || '',                 // 规格型号
                            unit: cells[6] || '',                 // 单位
                            quantity: cells[7] || '',             // 数量
                            unitPrice: cells[8] || '',            // 设备单价
                            subtotal: cells[9] || ''              // 小计
                        };

                        if (row.code || row.elevatorType) {
                            rows.push(row);
                        }
                    }
                }
            }

            console.log('========== 解析完成 ==========');
            console.log('总共解析行数:', rows.length);
            return rows;
        }

        function parseHTMLTable(text) {
            const rows = [];

            // 使用正则提取所有<tr>标签内容
            const trRegex = /<tr>(.*?)<\/tr>/gs;
            const trMatches = text.matchAll(trRegex);

            let expectedCount = 0;  // 期望的列数（以第一个包含完整数据的行确定）
            let rowIndex = 0;
            for (const trMatch of trMatches) {
                const trContent = trMatch[1];

                // 跳过表头行
                if (trContent.includes('序号') || trContent.includes('楼号')) {
                    continue;
                }

                // 提取所有<td>内容
                const tdRegex = /<td[^>]*>(.*?)<\/td>/gs;
                const cells = [];
                const tdMatches = trContent.matchAll(tdRegex);

                for (const tdMatch of tdMatches) {
                    // 去除HTML标签，只保留文本
                    const cellText = tdMatch[1].replace(/<[^>]+>/g, '').trim();
                    cells.push(cellText);
                }

                // 第一行数据行确定期望列数
                if (expectedCount === 0 && cells.length >= 4) {
                    expectedCount = cells.length;
                }

                // 如果某行列数少于期望值，说明楼号列有 rowspan 合并为空，在楼号位置补空
                if (expectedCount > 0 && cells.length < expectedCount && cells.length >= 4) {
                    cells.splice(1, 0, '');  // 在 cells[1]（楼号）位置插入空字符串
                    console.log(`第${rowIndex}行缺少列（合并行），已在楼号位置补空`);
                }

                console.log(`第${rowIndex}行，解析到${cells.length}列:`, cells);

                // 至少需要4列
                if (cells.length >= 4) {
                    const row = {
                        buildingNo: cells[1] || '',           // 楼号
                        elevatorType: cells[2] || '',         // 电梯分类
                        brand: cells[3] || '',                // 品牌
                        code: cells[4] || '',                 // 编号
                        spec: cells[5] || '',                 // 规格型号
                        unit: cells[6] || '',                 // 单位
                        quantity: cells[7] || '',             // 数量
                        unitPrice: cells[8] || '',            // 设备单价
                        subtotal: cells[9] || ''              // 小计
                    };

                    if (row.code || row.elevatorType) {
                        rows.push(row);
                        console.log(`✓ 添加第${rows.length}行:`, {
                            楼号: row.buildingNo,
                            电梯分类: row.elevatorType,
                            编号: row.code,
                            品牌: row.brand
                        });
                    }
                }

                rowIndex++;
            }

            console.log('HTML表格解析完成，总共:', rows.length, '行');
            return rows;
        }

        function extractBuildingNo(line) {
            if (!line) return '';
            // 楼号单独一列，直接返回原内容（如 "3#、10#楼"）
            return line.trim();
        }

        function extractSpec(line) {
            // 提取规格型号
            const match = line.match(/(\d+kg.*?\d+m\/s.*?\d+\/\d+\/\d+)/);
            if (match) return match[1];

            const match2 = line.match(/Xmodel\s*\d\s+(.*?)(?=台|$)/);
            if (match2) return match2[1].trim();

            return '';
        }

        function formatPrice(price) {
            // 格式化价格，添加千位分隔符
            if (!price) return '';
            const num = parseFloat(price);
            if (isNaN(num)) return price;
            return num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
