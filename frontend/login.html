<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 赛意AI</title>
    <link rel="icon" href="/static/images/favicon.ico">
    <link rel="stylesheet" href="/static/css/all.min.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body class="login-light panel-right">
    <main class="login-page">
        <a class="login-brand" href="/login">
            <img src="/static/images/vben-login/logo.png" alt="赛意AI">
            <span>赛意AI</span>
        </a>

        <div class="login-toolbar" aria-label="登录页工具栏">
            <button id="colorToggle" type="button" title="切换主题色">
                <i class="fas fa-palette"></i>
            </button>
            <button id="layoutToggle" type="button" title="切换布局">
                <i class="fas fa-columns"></i>
            </button>
            <button data-disabled-action type="button" title="切换语言">
                <i class="fas fa-language"></i>
            </button>
            <button id="themeToggle" type="button" title="切换明暗主题">
                <i class="fas fa-sun"></i>
            </button>
        </div>

        <div class="login-shell">
            <section class="login-panel-visual" aria-hidden="true">
                <div class="login-visual-card">
                    <img src="/static/images/vben-login/slogan.svg" alt="登录页插画">
                    <h2 class="login-visual-title">智能平台 - AI驱动</h2>
                    <p class="login-visual-desc">为企业提供专业的AI服务，包括文字识别、图像检测、智能分析等核心能力</p>
                </div>
            </section>

            <section class="login-panel-form">
                <div class="login-form-wrap">
                    <h1 class="login-title">欢迎回来👋🏻</h1>
                    <p class="login-subtitle">请输入您的帐户信息开始高效办公吧！</p>

                    <form id="loginForm" class="login-form" novalidate>
                        <div id="tenantField" class="login-field" hidden>
                            <select id="tenantId" name="tenantId" class="login-input login-select" aria-label="租户">
                                <option value="">请选择租户</option>
                            </select>
                        </div>

                        <div class="login-field">
                            <input id="username" name="username" class="login-input" type="text" placeholder="" autocomplete="username">
                        </div>

                        <div class="login-field login-field-password">
                            <input id="password" name="password" class="login-input" type="password" placeholder="" autocomplete="current-password">
                            <button id="togglePassword" class="login-field-action" type="button" aria-label="显示或隐藏密码">
                                <i class="fas fa-eye-slash"></i>
                            </button>
                        </div>

                        <div class="login-meta">
                            <label class="login-remember">
                                <input id="rememberMe" name="rememberMe" type="checkbox">
                                <span>记住账号</span>
                            </label>
                            <a class="login-link" data-disabled-action href="#">忘记密码?</a>
                        </div>

                        <div id="loginFeedback" class="login-feedback" aria-live="polite"></div>

                        <button id="loginSubmit" class="login-submit" type="submit">登录</button>

                        <div class="login-alt-actions">
                            <button class="login-alt-button" data-disabled-action type="button">手机号登录</button>
                            <button class="login-alt-button" data-disabled-action type="button">扫码登录</button>
                        </div>

                        <div class="login-divider">其他登录方式</div>

                        <div class="login-social">
                            <button data-disabled-action type="button" aria-label="微信登录">
                                <i class="fab fa-weixin"></i>
                            </button>
                            <button data-disabled-action type="button" aria-label="QQ登录">
                                <i class="fas fa-comment-dots"></i>
                            </button>
                            <button data-disabled-action type="button" aria-label="GitHub 登录">
                                <i class="fab fa-github"></i>
                            </button>
                            <button data-disabled-action type="button" aria-label="Google 登录">
                                <i class="fab fa-google"></i>
                            </button>
                        </div>

                        <div class="login-register">
                            还没有账号?
                            <a class="login-link" data-disabled-action href="#">创建账号</a>
                        </div>
                    </form>
                </div>

                <div class="login-copyright">Copyright © 2024 一体化平台</div>
            </section>
        </div>
    </main>

    <script src="/static/js/login.js"></script>
</body>
</html>
