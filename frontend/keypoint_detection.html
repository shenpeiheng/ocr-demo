<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛意AI - 全身关键点检测</title>
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="stylesheet" href="static/css/all.min.css">
    <link id="favicon" rel="icon" href="static/images/favicon.ico" type="image/x-icon">
    <style>
        /* 关键点检测页面样式 */
        .keypoint-page .content-grid {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .keypoint-page .left-column,
        .keypoint-page .right-column {
            display: none;
        }
        .keypoint-page .keypoint-full-column {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .keypoint-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 0;
        }

        .keypoint-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: white;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #eaeaea;
        }

        .keypoint-header h2 {
            color: #4a6572;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
            border-bottom: none;
            padding-bottom: 0;
        }

        .keypoint-header h2 i {
            color: #8e44ad;
        }

        .keypoint-header .header-hint {
            font-size: 0.85rem;
            color: #7f8c8d;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .keypoint-body {
            display: flex;
            gap: 10px;
            flex: 1;
            min-height: 0;
        }

        .keypoint-left-panel {
            width: 380px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .keypoint-right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 0;
        }

        .keypoint-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #eaeaea;
        }

        .keypoint-card h3 {
            color: #4a6572;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .keypoint-card h3 i {
            color: #8e44ad;
        }

        /* 上传区域 */
        .keypoint-upload-area {
            border: 3px dashed #8e44ad;
            border-radius: 15px;
            padding: 15px 15px;
            text-align: center;
            background: linear-gradient(135deg, #f5f0ff, #ede0ff);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .keypoint-upload-area:hover {
            background: linear-gradient(135deg, #ede0ff, #e0ccff);
            border-color: #6c3483;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(142, 68, 173, 0.15);
        }

        .keypoint-upload-area .upload-icon {
            font-size: 2.5rem;
            color: #8e44ad;
            margin-bottom: 6px;
        }

        .keypoint-upload-area .upload-text {
            font-size: 0.95rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 6px;
        }

        .keypoint-upload-area .upload-hint {
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        /* 预览区域 */
        .keypoint-preview-container {
            position: relative;
            display: none;
        }

        .keypoint-preview-container img {
            max-width: 100%;
            max-height: 120px;
            border-radius: 8px;
            border: 1px solid #eaeaea;
        }

        .keypoint-file-info {
            margin-top: 8px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .keypoint-file-info .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .keypoint-file-info .info-label {
            color: #7f8c8d;
        }

        .keypoint-file-info .info-value {
            color: #2c3e50;
            font-weight: 500;
        }

        /* 检测按钮 */
        .btn-detect-keypoint {
            width: 100%;
            padding: 10px;
            background: linear-gradient(90deg, #8e44ad, #6c3483);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-detect-keypoint:hover:not(:disabled) {
            background: linear-gradient(90deg, #6c3483, #5b2c6f);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(142, 68, 173, 0.35);
        }

        .btn-detect-keypoint:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* 结果图片区域 */
        .keypoint-result-image-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .keypoint-result-image-wrapper {
            flex: 1;
            background: #f8f9fa;
            border-radius: 8px;
            border: 2px dashed #dee2e6;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            min-height: 150px;
            position: relative;
        }

        .keypoint-result-image-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .keypoint-result-placeholder {
            text-align: center;
            color: #adb5bd;
        }

        .keypoint-result-placeholder i {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }

        .keypoint-result-placeholder p {
            font-size: 1rem;
        }

        /* JSON 结果区域 */
        .keypoint-json-container {
            max-height: 250px;
            overflow-y: auto;
        }

        .keypoint-json-container pre {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            overflow-x: auto;
            margin: 0;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* 检测统计 */
        .keypoint-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .keypoint-stat-card {
            text-align: center;
            padding: 15px 10px;
            border-radius: 8px;
            color: white;
        }

        .keypoint-stat-card .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .keypoint-stat-card .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-top: 4px;
        }

        /* 加载动画 */
        .keypoint-loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .keypoint-loading.active {
            display: block;
        }

        .keypoint-loading .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top-color: #8e44ad;
            border-radius: 50%;
            animation: kp-spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes kp-spin {
            to { transform: rotate(360deg); }
        }

        .keypoint-loading .loading-text {
            color: #7f8c8d;
            font-size: 0.95rem;
        }

        /* 示例图片选择 */
        .keypoint-sample-images {
            margin: 15px 0;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #eaeaea;
        }

        .keypoint-sample-images .sample-label {
            font-size: 0.85rem;
            color: #7f8c8d;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .keypoint-sample-images .sample-grid {
            display: flex;
            gap: 10px;
        }

        .keypoint-sample-images .sample-item {
            flex: 1;
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            text-align: center;
            background: white;
            padding: 6px;
        }

        .keypoint-sample-images .sample-item:hover {
            border-color: #8e44ad;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(142, 68, 173, 0.2);
        }

        .keypoint-sample-images .sample-item.selected {
            border-color: #8e44ad;
            background: #f5f0ff;
        }

        .keypoint-sample-images .sample-item img {
            width: 100%;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
        }

        .keypoint-sample-images .sample-item span {
            display: block;
            font-size: 0.75rem;
            color: #2c3e50;
            margin-top: 4px;
            font-weight: 500;
        }

        /* 关键点图例 */
        .keypoint-legend {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #eaeaea;
        }

        .keypoint-legend h4 {
            font-size: 0.85rem;
            color: #4a6572;
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .keypoint-legend-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }

        .keypoint-legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: #2c3e50;
            padding: 3px 6px;
            border-radius: 4px;
            background: white;
        }

        .keypoint-legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* 全屏查看器（与 index.html 统一） */
        .keypoint-fullscreen-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            animation: keypointFadeIn 0.3s ease;
        }
        .keypoint-fullscreen-viewer.active { display: flex; }
        .keypoint-fullscreen-content {
            width: 95%;
            height: 95%;
            background: #1a1a1a;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: keypointScaleIn 0.3s ease;
        }
        .keypoint-fullscreen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #2c3e50;
            color: white;
        }
        .keypoint-fullscreen-header h3 { margin: 0; font-size: 1.2rem; }
        .keypoint-fullscreen-close {
            background: none; border: none; color: white;
            font-size: 1.5rem; cursor: pointer; padding: 5px;
        }
        .keypoint-fullscreen-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        #keypointFullscreenImage {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
            transition: transform 0.3s ease;
            cursor: move;
            image-rendering: auto;
            image-rendering: crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            -ms-interpolation-mode: bicubic;
        }
        .keypoint-fullscreen-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 30px;
        }
        .keypoint-control-btn {
            background: #3498db;
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: background 0.3s ease;
        }
        .keypoint-control-btn:hover { background: #2980b9; }
        .keypoint-control-btn.zoom-in { background: #2ecc71; }
        .keypoint-control-btn.zoom-out { background: #e74c3c; }
        .keypoint-control-btn.zoom-reset { background: #f39c12; }
        .keypoint-control-btn.rotate-left { background: #9b59b6; }
        .keypoint-control-btn.rotate-right { background: #34495e; }
        .keypoint-control-btn.download-btn { background: #1abc9c; }
        .keypoint-fullscreen-info {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        @keyframes keypointFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes keypointScaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* 预览图片和结果图片可点击放大 */
        .keypoint-preview-container img,
        .keypoint-result-image-wrapper img {
            cursor: zoom-in;
            transition: transform 0.2s ease;
        }

        .keypoint-preview-container img:hover,
        .keypoint-result-image-wrapper img:hover {
            transform: scale(1.02);
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .keypoint-body {
                flex-direction: column;
            }
            .keypoint-left-panel {
                width: 100%;
            }
            .keypoint-legend-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
    <script src="https://unpkg.com/jquery@3.6.0/dist/jquery.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/jquery.json-viewer@1.5.0/json-viewer/jquery.json-viewer.css">
    <script src="https://unpkg.com/jquery.json-viewer@1.5.0/json-viewer/jquery.json-viewer.js"></script>
</head>
<body>
    <div class="container">
        <div id="header-placeholder"></div>

        <!-- 主体布局 -->
        <div class="main-layout">
            <div id="sidebar-placeholder"></div>

            <!-- 主要内容区域 -->
            <main class="main-content-area keypoint-page">
                <div class="content-grid">
                    <div class="keypoint-full-column">
                        <div class="keypoint-wrapper">
                            <!-- 主体 -->
                            <div class="keypoint-body">
                                <!-- 左侧面板：上传和设置 -->
                                <div class="keypoint-left-panel">
                                    <!-- 上传区域 -->
                                    <div class="keypoint-card">
                                        <h3><i class="fas fa-cloud-upload-alt"></i> 上传图片</h3>
                                        <div class="keypoint-upload-area" id="uploadArea">
                                            <div class="upload-icon">
                                                <i class="fas fa-image"></i>
                                            </div>
                                            <div class="upload-text">点击选择或拖放图片</div>
                                            <div class="upload-hint">支持 JPG、PNG、JPEG 格式</div>
                                            <input type="file" id="fileInput" accept=".jpg,.jpeg,.png" hidden>
                                            <button class="btn btn-primary upload-btn" type="button">
                                                <i class="fas fa-folder-open"></i> 选择文件
                                            </button>
                                        </div>

                                        <!-- 预览 -->
                                        <div class="keypoint-preview-container" id="previewContainer">
                                            <img id="imagePreview" src="" alt="图片预览">
                                            <div class="keypoint-file-info">
                                                <div class="info-row">
                                                    <span class="info-label">文件名:</span>
                                                    <span class="info-value" id="fileName">-</span>
                                                </div>
                                                <div class="info-row">
                                                    <span class="info-label">文件大小:</span>
                                                    <span class="info-value" id="fileSize">-</span>
                                                </div>
                                                <div class="info-row">
                                                    <span class="info-label">图片尺寸:</span>
                                                    <span class="info-value" id="imageDims">-</span>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- 检测按钮 -->
                                        <button class="btn-detect-keypoint" id="detectBtn">
                                            <i class="fas fa-search"></i>
                                            开始检测
                                        </button>

                                        <!-- 加载动画 -->
                                        <div class="keypoint-loading" id="loadingIndicator">
                                            <div class="spinner"></div>
                                            <span class="loading-text">正在调用模型进行关键点检测...</span>
                                        </div>

                                        <!-- 默认图片选择 -->
                                        <div class="keypoint-sample-images">
                                            <div class="sample-label"><i class="fas fa-images"></i> 示例图片：</div>
                                            <div class="sample-grid">
                                                <div class="sample-item selected" data-src="static/images/demo/11.jpg">
                                                    <img src="static/images/demo/11.jpg" alt="示例11">
                                                    <span>11.jpg</span>
                                                </div>
                                                <div class="sample-item" data-src="static/images/demo/12.jpg">
                                                    <img src="static/images/demo/12.jpg" alt="示例12">
                                                    <span>12.jpg</span>
                                                </div>
                                                <div class="sample-item" data-src="static/images/demo/13.jpg">
                                                    <img src="static/images/demo/13.jpg" alt="示例13">
                                                    <span>13.jpg</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- 检测统计 -->
                                    <div class="keypoint-card" id="statsCard" style="display: none;">
                                        <h3><i class="fas fa-chart-bar"></i> 检测统计</h3>
                                        <div class="keypoint-stats">
                                            <div class="keypoint-stat-card" style="background: linear-gradient(135deg, #8e44ad, #6c3483);">
                                                <div class="stat-value" id="personCount">0</div>
                                                <div class="stat-label">检测到人体</div>
                                            </div>
                                            <div class="keypoint-stat-card" style="background: linear-gradient(135deg, #3498db, #2980b9);">
                                                <div class="stat-value" id="imgWidth">0</div>
                                                <div class="stat-label">图片宽度</div>
                                            </div>
                                            <div class="keypoint-stat-card" style="background: linear-gradient(135deg, #2ecc71, #27ae60);">
                                                <div class="stat-value" id="imgHeight">0</div>
                                                <div class="stat-label">图片高度</div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- 关键点图例 -->
                                    <div class="keypoint-card" id="legendCard" style="display: none;">
                                        <h3><i class="fas fa-palette"></i> 关键点图例</h3>
                                        <div class="keypoint-legend">
                                            <h4><i class="fas fa-circle"></i> 17个COCO关键点</h4>
                                            <div class="keypoint-legend-grid" id="legendGrid">
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <!-- 右侧面板：结果展示 -->
                                <div class="keypoint-right-panel">
                                    <div class="keypoint-card ai-result-card">
                                        <div class="ai-result-header">
                                            <h3><i class="fas fa-eye"></i> 检测结果</h3>
                                            <div class="ai-result-actions">
                                                <div class="ai-result-tabs" data-ai-result-tabs>
                                                    <button type="button" class="ai-result-tab active" data-target="image">
                                                        <i class="fas fa-image"></i>
                                                        <span>图片结果</span>
                                                    </button>
                                                    <button type="button" class="ai-result-tab" data-target="json">
                                                        <i class="fas fa-file-code"></i>
                                                        <span>JSON 信息</span>
                                                    </button>
                                                </div>
                                                <button type="button" class="ai-result-copy" data-ai-copy-json title="复制 JSON" aria-label="复制 JSON">
                                                    <i class="fas fa-copy"></i>
                                                    <span>复制</span>
                                                </button>
                                            </div>
                                        </div>
                                        <div class="ai-result-body">
                                            <div class="ai-result-pane active" data-pane="image">
                                                <div class="keypoint-result-image-wrapper" id="resultImageWrapper">
                                                    <div class="keypoint-result-placeholder" id="resultPlaceholder">
                                                        <i class="fas fa-image"></i>
                                                        <p>上传图片并点击"开始检测"查看结果</p>
                                                    </div>
                                                    <img id="resultImage" src="" alt="检测结果" style="display: none;">
                                                </div>
                                            </div>
                                            <div class="ai-result-pane" data-pane="json">
                                                <div class="keypoint-json-container">
                                                    <pre id="jsonOutput">{
    "message": "等待检测..."
}</pre>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <div id="footer-placeholder"></div>
    </div>

    <script src="static/js/layout.js"></script>
    <script>
        // 全身关键点检测页面 JavaScript
        document.addEventListener('DOMContentLoaded', function() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const previewContainer = document.getElementById('previewContainer');
            const imagePreview = document.getElementById('imagePreview');
            const fileName = document.getElementById('fileName');
            const fileSize = document.getElementById('fileSize');
            const imageDims = document.getElementById('imageDims');
            const detectBtn = document.getElementById('detectBtn');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const statsCard = document.getElementById('statsCard');
            const personCount = document.getElementById('personCount');
            const imgWidth = document.getElementById('imgWidth');
            const imgHeight = document.getElementById('imgHeight');
            const resultImage = document.getElementById('resultImage');
            const resultPlaceholder = document.getElementById('resultPlaceholder');
            const jsonOutput = document.getElementById('jsonOutput');
            const legendCard = document.getElementById('legendCard');
            const legendGrid = document.getElementById('legendGrid');

            // 17个COCO关键点名称和颜色
            const KEYPOINT_INFO = [
                { name: 'nose', color: '#FF0000' },
                { name: 'left_eye', color: '#00FF00' },
                { name: 'right_eye', color: '#0000FF' },
                { name: 'left_ear', color: '#FFFF00' },
                { name: 'right_ear', color: '#FF00FF' },
                { name: 'left_shoulder', color: '#00FFFF' },
                { name: 'right_shoulder', color: '#8000FF' },
                { name: 'left_elbow', color: '#0080FF' },
                { name: 'right_elbow', color: '#FF8000' },
                { name: 'left_wrist', color: '#00FF80' },
                { name: 'right_wrist', color: '#80FF00' },
                { name: 'left_hip', color: '#FF0080' },
                { name: 'right_hip', color: '#800000' },
                { name: 'left_knee', color: '#000080' },
                { name: 'right_knee', color: '#008000' },
                { name: 'left_ankle', color: '#808000' },
                { name: 'right_ankle', color: '#008080' }
            ];

            // 生成图例
            KEYPOINT_INFO.forEach(function(kp) {
                var item = document.createElement('div');
                item.className = 'keypoint-legend-item';
                item.innerHTML = '<span class="keypoint-legend-dot" style="background: ' + kp.color + ';"></span>' + kp.name;
                legendGrid.appendChild(item);
            });

            let selectedFile = null;
            let selectedSampleSrc = 'static/images/demo/11.jpg';

            // 默认选中11.jpg并加载预览
            (function loadDefaultSample() {
                var img = new Image();
                img.onload = function() {
                    imagePreview.src = selectedSampleSrc;
                    previewContainer.style.display = 'block';
                    imageDims.textContent = img.width + ' × ' + img.height;
                };
                img.src = selectedSampleSrc;
                fileName.textContent = '11.jpg';
                fileSize.textContent = '-';
                detectBtn.disabled = false;
            })();

            // 示例图片选择
            const sampleItems = document.querySelectorAll('.sample-item');
            sampleItems.forEach(function(item) {
                item.addEventListener('click', function() {
                    sampleItems.forEach(function(si) { si.classList.remove('selected'); });
                    this.classList.add('selected');

                    const src = this.getAttribute('data-src');
                    selectedSampleSrc = src;
                    selectedFile = null;

                    var img = new Image();
                    img.onload = function() {
                        imagePreview.src = src;
                        previewContainer.style.display = 'block';
                        imageDims.textContent = img.width + ' × ' + img.height;
                    };
                    img.src = src;

                    fileName.textContent = src.split('/').pop();
                    fileSize.textContent = '-';
                    detectBtn.disabled = false;
                });
            });

            // 点击上传区域触发文件选择
            uploadArea.addEventListener('click', function() {
                fileInput.click();
            });

            // 拖放支持
            uploadArea.addEventListener('dragover', function(e) {
                e.preventDefault();
                uploadArea.style.borderColor = '#6c3483';
                uploadArea.style.background = 'linear-gradient(135deg, #ede0ff, #e0ccff)';
            });

            uploadArea.addEventListener('dragleave', function(e) {
                e.preventDefault();
                uploadArea.style.borderColor = '#8e44ad';
                uploadArea.style.background = 'linear-gradient(135deg, #f5f0ff, #ede0ff)';
            });

            uploadArea.addEventListener('drop', function(e) {
                e.preventDefault();
                uploadArea.style.borderColor = '#8e44ad';
                uploadArea.style.background = 'linear-gradient(135deg, #f5f0ff, #ede0ff)';
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleFile(files[0]);
                }
            });

            // 文件选择
            fileInput.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    handleFile(e.target.files[0]);
                }
            });

            // 处理文件
            function handleFile(file) {
                const validTypes = ['image/jpeg', 'image/png', 'image/jpg'];
                if (!validTypes.includes(file.type)) {
                    alert('请选择 JPG 或 PNG 格式的图片');
                    return;
                }

                selectedFile = file;
                selectedSampleSrc = null;

                var reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    previewContainer.style.display = 'block';
                };
                reader.readAsDataURL(file);

                fileName.textContent = file.name;
                fileSize.textContent = formatFileSize(file.size);

                var img = new Image();
                img.onload = function() {
                    imageDims.textContent = img.width + ' × ' + img.height;
                };
                img.src = URL.createObjectURL(file);

                detectBtn.disabled = false;
            }

            // 格式化文件大小
            function formatFileSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            }

            // 开始检测
            detectBtn.addEventListener('click', function() {
                if (!selectedFile && !selectedSampleSrc) return;

                detectBtn.disabled = true;
                detectBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 检测中...';
                loadingIndicator.classList.add('active');
                statsCard.style.display = 'none';
                legendCard.style.display = 'none';
                resultImage.style.display = 'none';
                resultPlaceholder.style.display = 'block';
                jsonOutput.textContent = '{\n    "status": "正在检测..."\n}';

                var formData = new FormData();

                if (selectedFile) {
                    formData.append('file', selectedFile);
                    doDetect(formData);
                } else if (selectedSampleSrc) {
                    fetch(selectedSampleSrc)
                        .then(function(resp) { return resp.blob(); })
                        .then(function(blob) {
                            var filename = selectedSampleSrc.split('/').pop();
                            var file = new File([blob], filename, { type: blob.type });
                            formData.append('file', file);
                            doDetect(formData);
                        })
                        .catch(function(err) {
                            jsonOutput.textContent = '{\n    "error": "' + err.message + '"\n}';
                            alert('加载示例图片失败: ' + err.message);
                            detectBtn.disabled = false;
                            detectBtn.innerHTML = '<i class="fas fa-search"></i> 开始检测';
                            loadingIndicator.classList.remove('active');
                        });
                }
            });

            /**
             * 动态获取 API 基础路径
             * 兼容 VSCode 端口转发代理路径
             */
            function getApiBaseUrl() {
                var pathname = window.location.pathname;
                var match = pathname.match(/^(\/proxy\/\d+)/);
                if (match) {
                    return match[1];
                }
                return '';
            }

            function doDetect(formData) {
                fetch(getApiBaseUrl() + '/api/keypoint_detection', {
                    method: 'POST',
                    body: formData
                })
                .then(function(response) {
                    return response.json().then(function(data) {
                        return { status: response.status, data: data };
                    });
                })
                .then(function(result) {
                    if (result.data.success) {
                        // 显示结果图片
                        resultImage.src = result.data.result_image;
                        resultImage.style.display = 'block';
                        resultPlaceholder.style.display = 'none';

                        // 显示统计
                        personCount.textContent = result.data.person_count;
                        imgWidth.textContent = result.data.image_width;
                        imgHeight.textContent = result.data.image_height;
                        statsCard.style.display = 'block';
                        legendCard.style.display = 'block';

                        // 显示 JSON
                        displayJSON("jsonOutput", result.data);
                    } else {
                        displayJSON("jsonOutput", result.data);
                        alert('检测失败: ' + (result.data.error || '未知错误'));
                    }
                })
                .catch(function(err) {
                    jsonOutput.textContent = '{\n    "error": "' + err.message + '"\n}';
                    alert('请求失败: ' + err.message);
                })
                .finally(function() {
                    detectBtn.disabled = false;
                    detectBtn.innerHTML = '<i class="fas fa-search"></i> 开始检测';
                    loadingIndicator.classList.remove('active');
                });
            }

            // 图片点击放大 - 使用全屏查看器（与 index.html 统一）
            function initImageZoom(imgElement) {
                if (!imgElement) return;
                imgElement.style.cursor = 'zoom-in';
                imgElement.addEventListener('click', function() {
                    if (this.src && this.src !== '') {
                        openKeypointFullscreenViewer(this.src);
                    }
                });
            }

            // 初始化预览图片和结果图片的点击放大
            var previewImg = document.getElementById('imagePreview');
            var resultImg = document.getElementById('resultImage');
            initImageZoom(previewImg);
            initImageZoom(resultImg);
        });
    </script>

    <!-- 全屏查看器（与 index.html 统一） -->
    <div class="keypoint-fullscreen-viewer" id="keypointFullscreenViewer">
        <div class="keypoint-fullscreen-content">
            <div class="keypoint-fullscreen-header">
                <h3>图片全屏查看</h3>
                <button class="keypoint-fullscreen-close" onclick="closeKeypointFullscreenViewer()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="keypoint-fullscreen-body">
                <img id="keypointFullscreenImage" src="" alt="全屏图片">
                <div class="keypoint-fullscreen-controls">
                    <button class="keypoint-control-btn zoom-in" onclick="keypointZoomIn()" title="放大"><i class="fas fa-search-plus"></i></button>
                    <button class="keypoint-control-btn zoom-out" onclick="keypointZoomOut()" title="缩小"><i class="fas fa-search-minus"></i></button>
                    <button class="keypoint-control-btn zoom-reset" onclick="keypointZoomReset()" title="重置"><i class="fas fa-sync-alt"></i></button>
                    <button class="keypoint-control-btn rotate-left" onclick="keypointRotateLeft()" title="左旋"><i class="fas fa-undo"></i></button>
                    <button class="keypoint-control-btn rotate-right" onclick="keypointRotateRight()" title="右旋"><i class="fas fa-redo"></i></button>
                    <button class="keypoint-control-btn download-btn" onclick="keypointDownloadImage()" title="下载"><i class="fas fa-download"></i></button>
                </div>
                <div class="keypoint-fullscreen-info">
                    <span id="keypointFullscreenInfo">缩放: 100% | 旋转: 0°</span>
                </div>
            </div>
        </div>
    </div>

    <script>
    // 全屏查看器功能（与 index.html 统一）
    (function() {
        var viewer = document.getElementById('keypointFullscreenViewer');
        var img = document.getElementById('keypointFullscreenImage');
        var info = document.getElementById('keypointFullscreenInfo');
        var scale = 1, rotation = 0;

        function updateTransform() {
            img.style.transform = 'scale(' + scale + ') rotate(' + rotation + 'deg)';
            info.textContent = '缩放: ' + Math.round(scale * 100) + '% | 旋转: ' + rotation + '°';
        }

        window.openKeypointFullscreenViewer = function(src) {
            img.src = src;
            scale = 1; rotation = 0;
            updateTransform();
            viewer.classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeKeypointFullscreenViewer = function() {
            viewer.classList.remove('active');
            document.body.style.overflow = '';
        };

        window.keypointZoomIn = function() { scale = Math.min(scale + 0.25, 5); updateTransform(); };
        window.keypointZoomOut = function() { scale = Math.max(scale - 0.25, 0.25); updateTransform(); };
        window.keypointZoomReset = function() { scale = 1; rotation = 0; updateTransform(); };
        window.keypointRotateLeft = function() { rotation = (rotation - 90) % 360; updateTransform(); };
        window.keypointRotateRight = function() { rotation = (rotation + 90) % 360; updateTransform(); };
        window.keypointDownloadImage = function() {
            var link = document.createElement('a');
            link.download = 'keypoint_image_' + Date.now() + '.png';
            link.href = img.src;
            link.click();
        };

        viewer.addEventListener('click', function(e) {
            if (e.target === viewer) closeKeypointFullscreenViewer();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && viewer.classList.contains('active')) closeKeypointFullscreenViewer();
        });
    })();
    </script>
    <script src="static/js/json-viewer-helper.js"></script>
</body>
</html>
